<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源详情 · 飞象老师</title>
<style>
  :root {
    --bg: #faf9f6;
    --side: #f4f3ef;
    --surface: #ffffff;
    --ink: #111110;
    --muted: #6b6a65;
    --faint: #a19f99;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.12);
    --gold: #a87e2c;
    --gold-soft: #fbf5e6;
    --green: #4a755b;
    --green-soft: #eaf3ed;
    --blue: #53759e;
    --blue-soft: #edf3f8;
    --purple: #81628f;
    --purple-soft: #f4eff5;
    --rose: #a8626c;
    --rose-soft: #f8eff0;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { border: 0; background: none; color: inherit; cursor: pointer; font: inherit; transition: all .18s; }
  .topbar {
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
  }
  .brand-logo {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--ink);
    color: var(--gold);
    display: grid;
    place-items: center;
  }
  .brand-domain {
    color: var(--faint);
    font-size: 12px;
    font-weight: 500;
    margin-left: 8px;
  }
  .wrap {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    min-height: calc(100vh - 56px);
    padding-bottom: 68px;
  }
  .stage {
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .crumb {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 12.5px;
    width: max-content;
  }
  .crumb:hover { color: var(--ink); }
  .preview {
    flex: 1;
    min-height: 520px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.02);
    overflow: hidden;
    display: grid;
    grid-template-rows: 180px 1fr;
  }
  .cover {
    display: grid;
    place-items: center;
    color: rgba(255,255,255,.82);
    position: relative;
  }
  .cover.mint { background: linear-gradient(135deg, #edf5ee, #c8e0cd); }
  .cover.lilac { background: linear-gradient(135deg, #f5f0f6, #ddc8e3); }
  .cover.sky { background: linear-gradient(135deg, #eff4f9, #c8d8e8); }
  .cover.cream { background: linear-gradient(135deg, #fdfaf3, #f0deb3); }
  .cover.sand { background: linear-gradient(135deg, #f7f2e8, #e3d4ae); }
  .cover svg { width: 64px; height: 64px; opacity: .48; }
  .tag {
    position: absolute;
    left: 18px;
    top: 18px;
    padding: 5px 11px;
    border-radius: 7px;
    background: rgba(255,255,255,.86);
    color: var(--ink);
    font-size: 12px;
    font-weight: 700;
  }
  .doc {
    padding: 34px 42px;
    max-width: 820px;
  }
  .doc h1 {
    font-size: 26px;
    line-height: 1.25;
    margin: 0 0 14px;
    letter-spacing: 0;
  }
  .doc p {
    color: #3a3633;
    line-height: 1.9;
    margin: 0 0 18px;
  }
  .sample {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-top: 22px;
  }
  .sample-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .sample ul { margin: 0; padding-left: 18px; color: #3a3633; line-height: 1.9; }
  .panel {
    background: var(--side);
    border-left: 1px solid var(--line);
    padding: 32px 28px;
  }
  .p-section { margin-bottom: 28px; }
  .p-title {
    color: var(--ink);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: .3px;
    margin-bottom: 12px;
  }
  .resource-head { display: flex; gap: 14px; align-items: flex-start; }
  .resource-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .resource-icon svg { width: 28px; height: 28px; }
  .resource-name { font-size: 18px; font-weight: 700; line-height: 1.35; margin-bottom: 5px; }
  .resource-meta { color: var(--muted); font-size: 11.5px; }
  .intro { color: #3a3633; font-size: 13px; line-height: 1.75; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-cell {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .stat-num { font-size: 18px; font-weight: 700; line-height: 1.1; }
  .stat-lbl { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .author-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-top: 1px solid var(--line);
  }
  .author-ava {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 600;
  }
  .author-name { font-size: 13px; font-weight: 600; }
  .author-meta { color: var(--muted); font-size: 11px; line-height: 1.4; margin-top: 2px; }
  .actions {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 40;
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px 28px;
    background: var(--surface);
    border-top: 1px solid var(--line);
    box-shadow: 0 -4px 16px rgba(0,0,0,.04);
  }
  .actions .meta {
    flex: 1;
    color: var(--muted);
    display: flex;
    gap: 14px;
    font-size: 12px;
  }
  .actions b { color: var(--ink); }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
  }
  .btn.ghost { background: var(--surface); border: 1px solid var(--line-strong); }
  .btn.ghost:hover { background: var(--bg); }
  .btn.primary { background: var(--ink); color: #fff; }
  .btn.primary:hover { background: #000; }
  #toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: rgba(17,17,16,.92);
    color: #fff;
    padding: 10px 18px;
    border-radius: 22px;
    font-size: 12.5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
    z-index: 9999;
  }
  #toast.show { opacity: 1; }
  @media (max-width: 1080px) {
    .wrap { grid-template-columns: 1fr; }
    .panel { border-left: 0; border-top: 1px solid var(--line); }
  }
</style>
<link rel="stylesheet" href="assets/review.css" />
</head>
<body>

<header class="topbar">
  <a class="brand" href="index.html" title="回到首页">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/></svg>

<div class="wrap">

    <article class="preview">

  </main>

  <aside class="panel">
    <div class="p-section">

      <div class="resource-head">
        <div class="resource-icon" id="resource-icon"></div>

</div>

<div class="actions">
  <div class="meta">
    <span><b id="bottom-views">—</b> 浏览</span>
    <span><b id="bottom-favs">—</b> 收藏</span>

  <button class="btn ghost" onclick="showToast('（演示）已收藏到我的知识库')">收藏</button>

<script>
const RESOURCES = [
  { title: '《荷塘月色》画面捕捉法 · 课堂活动', tag: '课件', cover: 'mint', subject: '语文', author: '王老师', avatar: '王', avatarColor: '#4a755b', views: '4.9万', fav: 821, icon: 'book', intro: '围绕《荷塘月色》的画面感、修辞和情绪流动设计课堂活动，适合 45 分钟精读课。' },
  { title: '文言虚词配对小游戏 · 必考 12 个', tag: '互动动画', cover: 'lilac', subject: '语文', author: '李老师', avatar: '李', avatarColor: '#81628f', views: '3.2万', fav: 412, icon: 'game', intro: '通过配对、闯关和错题回看帮助学生掌握 12 个高频文言虚词。' },
  { title: '现代散文阅读 5 步法 · 附课堂讲义', tag: 'PPT', cover: 'sky', subject: '语文', author: '陈老师', avatar: '陈', avatarColor: '#53759e', views: '2.8万', fav: 356, icon: 'slides', intro: '将散文阅读拆成线索、意象、语言、情感和主旨五步，并附可打印讲义。' },
  { title: '议论文 8 大常用角度 + 范文导读', tag: '官方精选', cover: 'cream', subject: '语文', author: '飞象教研组', avatar: '飞', avatarColor: '#a87e2c', views: '8.1万', fav: 1240, icon: 'crown', intro: '适合写作复习的议论文素材角度库，包含范文拆解和课堂讨论问题。' },
  { title: '二次函数图像与性质 · 互动动画', tag: '互动动画', cover: 'sky', subject: '数学', author: '张老师', avatar: '张', avatarColor: '#53759e', views: '5.4万', fav: 678, icon: 'shapes', intro: '拖动参数观察二次函数图像变化，帮助学生建立函数表达式与图像的对应关系。' },
  { title: '初中几何辅助线 12 招 · 解题模板', tag: '题单', cover: 'sand', subject: '数学', author: '刘老师', avatar: '刘', avatarColor: '#a87e2c', views: '6.7万', fav: 932, icon: 'compass', intro: '按题型归纳常见辅助线构造方法，配套例题和迁移练习。' },
  { title: '相似三角形判定与应用 · 中考冲刺', tag: '官方精选', cover: 'cream', subject: '数学', author: '飞象教研组', avatar: '飞', avatarColor: '#a87e2c', views: '7.5万', fav: 1102, icon: 'crown', intro: '围绕中考高频相似三角形模型组织例题、变式和限时训练。' },
  { title: '一次函数实际应用题 · 速解技巧', tag: '课件', cover: 'mint', subject: '数学', author: '黄老师', avatar: '黄', avatarColor: '#4a755b', views: '3.6万', fav: 489, icon: 'book', intro: '将一次函数应用题拆成读图、建模、求解和解释四个步骤。' },
  { title: '高中英语完形填空高频词 200 个', tag: '题单', cover: 'lilac', subject: '英语', author: '吴老师', avatar: '吴', avatarColor: '#81628f', views: '4.3万', fav: 612, icon: 'book', intro: '按语义场景整理完形填空高频词，配套语境辨析和小测。' },
  { title: '英语作文万能开头与结尾模板', tag: '范文', cover: 'sky', subject: '英语', author: '徐老师', avatar: '徐', avatarColor: '#6b6a65', views: '3.9万', fav: 521, icon: 'slides', intro: '覆盖常见写作主题的开头、结尾和过渡表达，便于学生仿写迁移。' },
  { title: '牛顿三大定律 · 经典实验视频集', tag: '视频', cover: 'sky', subject: '物理', author: '杨老师', avatar: '杨', avatarColor: '#a8626c', views: '2.5万', fav: 348, icon: 'slides', intro: '用实验视频串联牛顿三大定律，配套观察任务和课堂追问。' },
  { title: '电路图解题 7 步法 · 含中考真题', tag: '课件', cover: 'sky', subject: '物理', author: '周老师', avatar: '周', avatarColor: '#53759e', views: '3.1万', fav: 412, icon: 'shapes', intro: '帮助学生从电路识别、等效转换到计算表达形成稳定解题路径。' },
  { title: '化学方程式配平大全 · 初三总复习', tag: '题单', cover: 'mint', subject: '化学', author: '赵老师', avatar: '赵', avatarColor: '#4a755b', views: '4.0万', fav: 583, icon: 'book', intro: '按反应类型归纳配平方法，包含易错点提示和分层练习。' },
  { title: '细胞分裂动画演示 · 减数分裂全过程', tag: '互动动画', cover: 'sand', subject: '生物', author: '钱老师', avatar: '钱', avatarColor: '#a87e2c', views: '2.2万', fav: 287, icon: 'shapes', intro: '用动态过程展示减数分裂关键阶段，配套概念辨析和检查题。' },
  { title: '中国近代史时间轴 · 互动梳理', tag: '互动动画', cover: 'sand', subject: '历史', author: '孙老师', avatar: '孙', avatarColor: '#a87e2c', views: '1.9万', fav: 245, icon: 'game', intro: '把近代史关键事件放入可拖拽时间轴，帮助学生建立因果链。' },
  { title: '世界气候类型分布 · 高考填图集训', tag: '题单', cover: 'sky', subject: '地理', author: '马老师', avatar: '马', avatarColor: '#6b6a65', views: '2.4万', fav: 312, icon: 'compass', intro: '结合世界地图进行气候类型识别、成因分析和高考填图训练。' }
];
const ICONS = {
  book: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
  game: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><path d="M17.32 5H6.68a4 4 0 0 0-3.98 3.59C2.6 9.42 2 14.46 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.4-1.4A2 2 0 0 1 9.83 16h4.34a2 2 0 0 1 1.41.59L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.54-.6-6.58-.69-7.26A4 4 0 0 0 17.32 5z"/></svg>',
  slides: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 3h20"/><path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3"/><path d="m7 21 5-5 5 5"/></svg>',
  crown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>',
  shapes: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 3 4 9h8z"/><circle cx="17" cy="7" r="3"/><rect x="4" y="13" width="8" height="8" rx="1"/><path d="M14 13h7v8h-7z"/></svg>',
  compass: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>'
};
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
function getParam(k) {
  return new URLSearchParams(location.search).get(k) || '';
}
function renderResource() {
  const title = getParam('resource');
  const r = RESOURCES.find(item => item.title === title) || RESOURCES[0];
  document.title = `${r.title} · 飞象老师`;
  document.getElementById('doc-title').textContent = r.title;
  document.getElementById('doc-intro').textContent = r.intro;
  document.getElementById('resource-name').textContent = r.title;
  document.getElementById('resource-meta').textContent = `${r.subject} · ${r.tag} · 2026.5 更新`;
  document.getElementById('resource-intro').textContent = r.intro;
  document.getElementById('tag').textContent = r.tag;
  document.getElementById('views').textContent = r.views;
  document.getElementById('favs').textContent = r.fav;
  document.getElementById('bottom-views').textContent = r.views;
  document.getElementById('bottom-favs').textContent = r.fav;
  document.getElementById('author-name').textContent = r.author;
  document.getElementById('author-ava').textContent = r.avatar;
  document.getElementById('author-ava').style.background = r.avatarColor;
  document.getElementById('cover').className = `cover ${r.cover}`;
  document.getElementById('cover-icon').innerHTML = ICONS[r.icon] || ICONS.book;
  const icon = document.getElementById('resource-icon');
  icon.style.background = r.cover === 'cream' || r.cover === 'sand' ? 'var(--gold-soft)' : 'var(--blue-soft)';
  icon.style.color = r.cover === 'cream' || r.cover === 'sand' ? 'var(--gold)' : 'var(--blue)';
  icon.innerHTML = ICONS[r.icon] || ICONS.book;
  document.getElementById('sample-list').innerHTML = [
    '课堂导入：用 3 分钟问题把学生带入情境',
    '核心活动：小组协作完成关键任务卡',
    'AI 延展：自动生成分层练习与课后巩固'
  ].map(text => `<li>${text}</li>`).join('');
}
renderResource();
</script>
