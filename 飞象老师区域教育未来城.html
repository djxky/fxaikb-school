    function selectSchool(next){const previous=selectedSchool;selectedSchool=next;if(previous>=0&&towerMarkers[previous])towerMarkers[previous].setContent(towerContent(previous));if(next>=0&&next!==previous&&towerMarkers[next])towerMarkers[next].setContent(towerContent(next));}
    function clearFocusWait(){clearTimeout(focusCardTimer);focusCardTimer=null;if(focusEndHandler&&map){map.off('moveend',focusEndHandler);focusEndHandler=null;}}
    function card(i){const s=schools[i],teachers=20+i*3,uses=Math.round((38+i*17)*activeDays/7),resources=Math.round((46+i*13)*(.82+activeDays/500)),deposit=schoolDeposit(i),lead=Object.entries(deposits).find(([name])=>name===s[0]);return `<article class="school-card"><button class="card-close" onclick="closeSchoolCard()" aria-label="关闭学校详情">×</button><span class="tag">学校节点 / ${String(i+1).padStart(2,'0')}</span><h3>${s[0]}</h3><div class="grid"><span>活跃教师<b>${teachers}</b></span><span>${modes[mode].label}<b>${uses}</b></span><span>资源复用<b>${resources}</b></span><span>资源沉淀<b>${deposit} 项</b></span></div>${lead?'<button>区域资源沉淀榜 · 示范节点</button>':'<button onclick="window.open(\'飞象老师校园版学校驾驶舱.html?school=\'+encodeURIComponent(\''+s[0]+'\'),\'_blank\',\'noopener\')">进入学校驾驶舱 →</button>'}</article>`;}
    function styleHongkouBuildings(){AMap.plugin('AMap.DistrictSearch',()=>{const search=new AMap.DistrictSearch({extensions:'all',level:'district',subdistrict:0});search.search('虹口区',(status,result)=>{const boundaries=result?.districtList?.[0]?.boundaries||[];if(status!=='complete'||!boundaries.length)return;buildingLayer.setStyle({hideWithoutStyle:false,areas:boundaries.map(path=>({path,rejectTexture:true,color1:'ff1e4a8e',color2:'ff061438'}))});const districtTint=boundaries.map(path=>new AMap.Polygon({path,strokeOpacity:0,fillColor:'#2467e8',fillOpacity:.14,zIndex:70,bubble:true}));const edge=boundaries.map(path=>new AMap.Polygon({path,strokeColor:'#78b5ff',strokeOpacity:.7,strokeWeight:1.5,fillColor:'#2461c4',fillOpacity:0,zIndex:120,bubble:true}));map.add([...districtTint,...edge]);});});}
    function setOverviewButton(visible){document.getElementById('return-overview').classList.toggle('show',visible);}
    function closeSchoolCard(){info?.close();}
    function focusSchool(i){const s=schools[i],sequence=++focusSequence;clearFocusWait();setOverviewButton(true);info.close();selectSchool(i);const openCard=()=>{if(sequence!==focusSequence||selectedSchool!==i)return;clearFocusWait();info.setContent(card(i));info.open(map,[s[1],s[2]]);};focusEndHandler=()=>{clearTimeout(focusCardTimer);focusCardTimer=setTimeout(openCard,100);};focusCardTimer=setTimeout(openCard,2100);map.setZoomAndCenter(17.2,[s[1],s[2]],false,1800);map.on('moveend',focusEndHandler);}
    function returnOverview(){focusSequence+=1;clearFocusWait();setOverviewButton(false);info.close();selectSchool(-1);map.setZoomAndCenter(14.55,overviewCenter,false,1600);}
    function init(){buildingLayer=new AMap.Buildings({zooms:[17,20],zIndex:10,heightFactor:1.45});map=new AMap.Map('map',{viewMode:'3D',center:overviewCenter,zoom:14.55,zooms:[2,20],pitch:56,rotation:-19,skyColor:'#020817',showLabel:false,showBuildingBlock:false,buildingAnimation:true,mapStyle:'amap://styles/darkblue',dragEnable:true,pitchEnable:true,rotateEnable:true,zoomEnable:true,keyboardEnable:true});map.add(buildingLayer);map.addControl(new AMap.ControlBar({position:{right:'23px',bottom:'142px'}}));map.on('complete',styleHongkouBuildings);map.on('click',()=>{if(selectedSchool!==-1){focusSequence+=1;clearFocusWait();setOverviewButton(false);info.close();selectSchool(-1);}});info=new AMap.InfoWindow({isCustom:true,autoMove:false,offset:new AMap.Pixel(0,-14),closeWhenClickMap:true});schools.forEach((s,i)=>{const marker=new AMap.Marker({position:[s[1],s[2]],content:towerContent(i),offset:new AMap.Pixel(0,0),zIndex:200+i});marker.on('click',()=>focusSchool(i));marker.setMap(map);towerMarkers.push(marker);});showSchoolEvent(liveEvents[liveEventCursor]);document.getElementById('return-overview').onclick=returnOverview;document.getElementById('zoom-in').onclick=()=>map.zoomIn();document.getElementById('zoom-out').onclick=()=>map.zoomOut();}
    const script=document.createElement('script');script.src='https://webapi.amap.com/maps?v=2.0&key=3149dfa0e11ebc3c2bb7800ea8b3ff54&plugin=AMap.ControlBar,AMap.DistrictSearch';script.onload=init;document.head.appendChild(script);
  </script>
