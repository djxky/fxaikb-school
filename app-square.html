<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞象老师校园版 · 应用广场</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="assets/v28.css?v=20260521d" />
<link rel="stylesheet" href="assets/feixiang-shell.css" />
<link rel="stylesheet" href="assets/page-header.css" />
<link rel="stylesheet" href="assets/ai-create-dock.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  
  .main {
    display: flex; flex-direction: column;
    overflow-y: auto;
    height: 100vh;
  }

  .page-header[data-page-header="app-square"] {
    position: static;
  }

  /* ===== 分类 Tab 横向 ===== */
  .page-head-tabs {
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px 0;
    position: sticky; top: 0; z-index: 45;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  
  .subject-tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .head-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    padding-bottom: 12px;
  }
  .subject-tabs::-webkit-scrollbar { display: none; }
  .subject-tab {
    padding: 8px 18px;
    border-radius: 18px;
    font-size: 13.5px; font-weight: 500;
    color: var(--text-2);
    white-space: nowrap;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
    border: none;
    background: transparent;
    cursor: pointer;
  }
  .subject-tab:hover { color: var(--text-1); background: var(--bg); }
  .subject-tab.active {
    color: var(--gold-deep);
    background: var(--gold-bg);
    font-weight: 600;
  }

  /* ===== 卡片网格 ===== */
  .grid-wrap { padding: 28px 40px 60px; max-width: 1480px; margin: 0 auto; width: 100%; }
  .content-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  /* ===== 应用卡片 (资源广场风格) ===== */
  .app-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg); overflow: hidden;
    display: flex; flex-direction: column;
    text-align: left;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none; color: inherit;
  }
  .app-card:hover {
    border-color: var(--line-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  .app-cover {
    height: 130px; position: relative;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.85);
  }
  .bg-grad-1 { background: linear-gradient(135deg, #edf5ee, #c8e0cd); }
  .bg-grad-2 { background: linear-gradient(135deg, #f5f0f6, #ddc8e3); }
  .bg-grad-3 { background: linear-gradient(135deg, #eff4f9, #c8d8e8); }
  .bg-grad-4 { background: linear-gradient(135deg, #fdfaf3, #f0deb3); }
  .bg-grad-5 { background: linear-gradient(135deg, #fbf0f1, #ecc7ca); }
  .bg-grad-6 { background: linear-gradient(135deg, #f7f2e8, #e3d4ae); }
  .bg-grad-7 { background: linear-gradient(135deg, #f1f3f5, #cdd5dd); }
  .bg-grad-8 { background: linear-gradient(135deg, #fbf3eb, #f0d3b8); }

  .app-cover-icon {
    opacity: 0.45;
  }
  .app-cover-icon svg { width: 38px; height: 38px; }

  .app-tag {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; color: var(--ink);
  }
  .app-tag.gold { color: var(--gold); }
  
  .app-stats {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    padding: 3px 8px; border-radius: 6px;
    font-size: 10.5px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }

  .app-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .app-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 40px;
  }
  
  .app-author {
    margin-top: auto; display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    padding-top: 4px;
  }
  .author-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--line-strong);
    display: grid; place-items: center;
    font-size: 11px; color: #fff; font-weight: 600;
    flex-shrink: 0;
  }
  .app-author-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ===== 响应式 ===== */
  @media (max-width: 1280px) {
    .grid-wrap, .page-head-tabs { padding-left: 28px; padding-right: 28px; }
  }
  @media (max-width: 760px) {
    .page-head-tabs {
      align-items: stretch;
      flex-direction: column;
      gap: 8px;
    }
  }
</style>
</head>
<body data-page="app-square">

<div class="app">
  <aside id="feixiang-sidebar"></aside>

  <main class="main">
    <!-- 统一页面顶栏 · page-header -->
    <header class="page-header" data-page-header="app-square" data-scroll-target=".main">
      <div class="ph-left">
        <i class="ph-icon" data-lucide="blocks"></i>
        <h1 class="ph-title">应用广场</h1>
      </div>
    </header>

    <div class="page-head-tabs">
      <div class="subject-tabs" id="category-tabs">
        <button class="subject-tab active" data-cat="all">全部</button>
        <button class="subject-tab" data-cat="official">官方精选</button>
        <button class="subject-tab" data-cat="school">本校共建</button>
        <button class="subject-tab" data-cat="global">全域热门</button>
        <button class="subject-tab" data-cat="tool">效率工具</button>
        <button class="subject-tab" data-cat="subject">学科专属</button>
      </div>
      <div class="head-actions">
        <label class="ph-search">
          <i data-lucide="search"></i>
          <input type="text" placeholder="搜索应用、智能体…">
        </label>
        <button class="ph-action is-primary" onclick="alert('（演示）创建应用')">
          <i data-lucide="plus"></i><span>创建应用</span>
        </button>
      </div>
    </div>

    <div class="grid-wrap">
      <div class="content-grid" id="grid">
        <!-- 卡片由 JS 渲染 -->
      </div>
    </div>

    <div class="ai-dock-spacer"></div>
  </main>

  <!-- AI 创造入口 · 浏览-创造闭环 -->
  <aside class="ai-dock"
         data-kind="应用"
         data-placeholders="描述你想要的应用,例如:做个错题本扫描小工具,自动归类知识点|搭一个家长会签到 H5,扫码即可参与|做一个英语听力对练 Agent,陪学生练 5 分钟|班费记账小程序,扫码记账+月度图表|文言文情景闯关游戏,初二上学期">
    <span class="ai-dock-tag" title="把你想要的应用说出来,AI 帮你生成">
      <i data-lucide="sparkles"></i>
      <span>AI 应用生成</span>
    </span>
    <div class="ai-dock-input-wrap">
      <textarea class="ai-dock-input" rows="1" autocomplete="off"
                placeholder="描述你想要的应用…"></textarea>
    </div>
    <div class="ai-dock-actions">
      <button class="ai-dock-btn" type="button" title="语音输入" onclick="alert('（演示）语音输入')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      </button>
      <button class="ai-dock-btn ai-dock-send" type="button" title="发送(Enter)">
        <i data-lucide="arrow-up"></i>
      </button>
    </div>
  </aside>
</div>

<script src="assets/feixiang-shell.js"></script>
<script>renderFeixiangSidebar('apps');</script>
<script src="assets/page-header.js"></script>
<script src="assets/ai-create-dock.js"></script>

<script>
  // ====== mock 应用数据 ======
  const APPS = [
    { id: 'exam', title: 'AI 试卷分析专家', desc: '上传试卷图片，自动批改并生成班级得分率、易错题分析报告。', author: '飞象官方', avatar: '飞', avatarColor: '#a87e2c', badge: '官方', badgeClass: 'badge-official', usage: '12.5w', icon: 'bar-chart-2', grad: 1, cat: ['official', 'tool'] },
    { id: 'classic-game', title: '文言文情景闯关 (H5)', desc: '将枯燥的文言文背诵转化为互动文字游戏，学生扫码即可在手机上游玩。', author: '李素芬', avatar: '李', avatarColor: '#81628f', badge: '本校', badgeClass: 'badge-school', usage: '842', icon: 'gamepad-2', grad: 2, cat: ['school', 'subject'] },
    { id: 'notify', title: '家长会通知生成器', desc: '输入开会时间和重点，自动生成得体、专业的家长会邀请函及群通知。', author: '全域热门', avatar: '全', avatarColor: '#53759e', badge: '', badgeClass: '', usage: '3.2w', icon: 'mail', grad: 3, cat: ['global', 'tool'] },
    { id: 'lesson-plan', title: '智能教案排版', desc: '输入教学目标和知识点，一键生成符合学校标准格式的 Word 教案。', author: '飞象官方', avatar: '飞', avatarColor: '#a87e2c', badge: '官方', badgeClass: 'badge-official', usage: '8.9w', icon: 'file-text', grad: 4, cat: ['official', 'tool'] },
    { id: 'finance', title: '班费记账本 (Web App)', desc: '轻量级班费管理工具，支持扫码记账、自动生成月度收支图表。', author: '王建华', avatar: '王', avatarColor: '#4a755b', badge: '本校', badgeClass: 'badge-school', usage: '156', icon: 'pie-chart', grad: 5, cat: ['school', 'tool'] },
    { id: 'speaking', title: '英语口语对练 Agent', desc: '模拟真实对话场景，支持语音输入，自动纠正语法和发音错误。', author: '飞象官方', avatar: '飞', avatarColor: '#a87e2c', badge: '官方', badgeClass: 'badge-official', usage: '21.3w', icon: 'mic', grad: 6, cat: ['official', 'subject'] },
    { id: 'sports-signup', title: '运动会报名收集', desc: '快速生成报名表单，自动校验每人限报项目数，一键导出 Excel。', author: '全域热门', avatar: '全', avatarColor: '#53759e', badge: '', badgeClass: '', usage: '1.1w', icon: 'clipboard-list', grad: 7, cat: ['global', 'tool'] },
    { id: 'chemistry-lab', title: '化学实验模拟器', desc: 'H5 互动小应用，拖拽烧杯和试剂，安全模拟危险化学反应现象。', author: '赵明杰', avatar: '赵', avatarColor: '#a8626c', badge: '本校', badgeClass: 'badge-school', usage: '420', icon: 'flask-conical', grad: 8, cat: ['school', 'subject'] },
  ];

  const ICON_SVG = {
    'bar-chart-2': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    'gamepad-2': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>',
    'mail': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
    'file-text': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>',
    'pie-chart': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>',
    'mic': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>',
    'clipboard-list': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Z"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>',
    'flask-conical': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a1 1 0 0 0 .9 1.45h12.76a1 1 0 0 0 .9-1.45l-5.069-10.127A2 2 0 0 1 14 9.527V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></svg>'
  };

  function renderCards(filter = 'all') {
    const grid = document.getElementById('grid');
    const list = filter === 'all' ? APPS : APPS.filter(a => a.cat.includes(filter));

    if (list.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--text-3);">该分类暂无应用，敬请期待</div>';
      return;
    }

    grid.innerHTML = list.map(a => `
      <a class="app-card" href="app-detail.html?app=${encodeURIComponent(a.id)}">
        <div class="app-cover bg-grad-${a.grad}">
          <span class="app-tag ${a.badge === '官方' ? 'gold' : ''}">${a.badge || '热门'}</span>
          <div class="app-cover-icon">${ICON_SVG[a.icon] || ''}</div>
          <span class="app-stats">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ${a.usage}
          </span>
        </div>
        <div class="app-body">
          <div class="app-title" title="${a.title}">${a.title}</div>
          <div class="app-author">
            <div class="author-avatar" style="background: ${a.avatarColor}">${a.avatar}</div>
            <span class="app-author-name">${a.author}</span>
          </div>
        </div>
      </a>
    `).join('');
    
    if (window.lucide) lucide.createIcons();
  }

  document.querySelectorAll('.subject-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderCards(tab.dataset.cat);
    });
  });

  // 初始渲染
  renderCards('all');
</script>

</body>
</html>
