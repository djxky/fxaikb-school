<head>

<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .main {
    display: flex; flex-direction: column;
    overflow-y: auto;
    height: 100vh;
  }

  .page-header[data-page-header="my-apps"] {
    position: static;
  }

  /* ===== 分类 Tab 横向 ===== */
  .page-head-tabs {
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px 0;
    position: sticky; top: 0; z-index: 45;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  .subject-tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .head-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    padding-bottom: 12px;
  }
  .subject-tabs::-webkit-scrollbar { display: none; }
  .subject-tab {
    padding: 8px 18px;
    border-radius: 18px;
    font-size: 13.5px; font-weight: 500;
    color: var(--text-2);
    white-space: nowrap;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
    border: none;
    background: transparent;
    cursor: pointer;
  }
  .subject-tab:hover { color: var(--text-1); background: var(--bg); }
  .subject-tab.active {
    color: var(--gold-deep);
    background: var(--gold-bg);
    font-weight: 600;
  }
  /* ===== 卡片网格 ===== */
  .grid-wrap { padding: 28px 40px 60px; max-width: 1480px; margin: 0 auto; width: 100%; }
  .content-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  /* ===== 空间卡片 ===== */
  .app-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: visible;
    display: flex; flex-direction: column;
    text-align: left;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none; color: inherit;
    position: relative;
  }
  .app-card:has(.app-hover-actions.open) {
    z-index: 5;
  }
  .app-card:hover {
    border-color: var(--line-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }
  .app-card.is-draft {
    border-style: dashed;
    opacity: 0.85;
  }

  .app-cover {
    height: 130px; position: relative;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.85);
    border-radius: calc(var(--radius-lg) - 1px) calc(var(--radius-lg) - 1px) 0 0;
    overflow: hidden;
  }
  .bg-grad-1 { background: linear-gradient(135deg, #edf5ee, #c8e0cd); }
  .bg-grad-2 { background: linear-gradient(135deg, #f5f0f6, #ddc8e3); }
  .bg-grad-3 { background: linear-gradient(135deg, #eff4f9, #c8d8e8); }
  .bg-grad-4 { background: linear-gradient(135deg, #fdfaf3, #f0deb3); }
  .bg-grad-5 { background: linear-gradient(135deg, #fbf0f1, #ecc7ca); }
  .bg-grad-6 { background: linear-gradient(135deg, #f7f2e8, #e3d4ae); }
  .bg-grad-7 { background: linear-gradient(135deg, #f1f3f5, #cdd5dd); }
  .bg-grad-8 { background: linear-gradient(135deg, #fbf3eb, #f0d3b8); }
  .bg-grad-9 { background: linear-gradient(135deg, #f0f0eb, #d3c8ad); }
  .bg-grad-10 { background: linear-gradient(135deg, #ecf3f0, #c2d7cd); }
  .bg-grad-11 { background: linear-gradient(135deg, #f5edf2, #d8b9c8); }

  .app-cover-icon {
    opacity: 0.45;
  }
  .app-cover-icon svg { width: 38px; height: 38px; }

  .app-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .app-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 40px;
    white-space: normal;
  }
  
  .app-author {
    margin-top: auto; display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    padding-top: 4px;
  }
  .author-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--line-strong);
    display: grid; place-items: center;
    font-size: 11px; color: #fff; font-weight: 600;
    flex-shrink: 0;
  }
  .app-author-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .app-fav-stats {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #8f8d87;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .app-fav-stats svg {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
  }

  /* 卡片操作菜单 */
  .app-hover-actions {
    position: relative;
    margin-left: 2px;
    flex-shrink: 0;
  }
  .app-icon-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-2);
    display: grid; place-items: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .app-icon-btn:hover {
    color: var(--text-1);
    background: rgba(0,0,0,0.04);
  }
  .app-icon-btn.danger:hover {
    color: #e5484d;
    background: #ffe3e3;
  }
  .app-icon-btn svg { width: 14px; height: 14px; }
  .app-menu-pop {
    position: absolute;
    top: 30px; right: 0;
    z-index: 20;
    width: 112px;
    padding: 5px;
    border-radius: 10px;
    background: #fff;
    border: 1px solid var(--line);
    box-shadow: 0 12px 28px rgba(0,0,0,0.10);
    display: none;
  }
  .app-hover-actions.open .app-menu-pop { display: block; }
  .app-menu-item {
    width: 100%;
    border: 0;
    background: transparent;
    border-radius: 7px;
    padding: 7px 8px;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .app-menu-item:hover {
    background: var(--bg);
    color: var(--text-1);
  }
  .app-menu-item.danger:hover {
    background: #fff0f0;
    color: #e5484d;
  }
  .app-menu-item svg { width: 13px; height: 13px; }
  
  @media (max-width: 1280px) {
    .grid-wrap, .page-head-tabs { padding-left: 28px; padding-right: 28px; }
  }
  @media (max-width: 760px) {
    .page-head-tabs {
      align-items: stretch;
      flex-direction: column;
      gap: 8px;
    }
  }

  /* ===== 创建应用弹窗样式 ===== */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(45, 38, 27, 0.4);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: grid;
    place-items: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .modal-overlay.active {
    opacity: 1; pointer-events: auto;
  }
  .modal-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 16px;
    width: min(500px, calc(100% - 32px));
    box-shadow: 0 20px 40px rgba(45, 38, 27, 0.15);
    display: flex; flex-direction: column;
    overflow: hidden;
    transform: translateY(20px);
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .modal-overlay.active .modal-card {
    transform: translateY(0);
  }
  .modal-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title {
    font-size: 16px; font-weight: 650; color: var(--text-1);
    display: flex; align-items: center; gap: 8px;
  }
  .modal-close {
    background: none; border: none; cursor: pointer; color: var(--text-3);
    display: grid; place-items: center; padding: 4px; border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: var(--bg); color: var(--text-1); }
  .modal-body {
    padding: 24px;
    display: flex; flex-direction: column; gap: 18px;
    max-height: 70vh; overflow-y: auto;
  }
  .form-group {
    display: flex; flex-direction: column; gap: 6px;
  }
  .form-label {
    font-size: 12.5px; font-weight: 600; color: var(--text-2);
  }
  .form-input, .form-textarea {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13.5px; color: var(--text-1);
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--gold-deep);
    box-shadow: 0 0 0 3px rgba(168, 126, 44, 0.1);
  }
  .form-textarea {
    resize: none;
    height: 72px;
  }
  
  /* 图标与背景色选择 */
  .selection-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .icon-select-btn {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    display: grid; place-items: center;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-select-btn:hover {
    border-color: var(--line-strong);
    color: var(--text-1);
  }
  .icon-select-btn.active {
    border-color: var(--gold-deep);
    background: var(--gold-bg);
    color: var(--gold-deep);
  }
  .icon-select-btn svg { width: 18px; height: 18px; }

  .color-swatch-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }
  .color-swatch-btn {
    height: 36px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: grid; place-items: center;
  }
  .color-swatch-btn:hover {
    transform: scale(1.05);
  }
  .color-swatch-btn.active {
    border-color: var(--gold-deep);
    box-shadow: 0 0 0 3px rgba(168, 126, 44, 0.15);
  }
  .color-swatch-btn.active::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(17,17,16,.62);
  }
  
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: flex-end; gap: 10px;
    background: var(--surface);
  }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text-2);
  }
  .btn:hover {
    color: var(--text-1); border-color: var(--line-strong);
  }
  .btn.primary {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }
  .btn.primary:hover {
    background: #000;
    border-color: #000;
  }

  /* 删除确认弹窗 */
  .delete-confirm-overlay {
    position: fixed;
    inset: 0;
    z-index: 1100;
    display: grid;
    place-items: center;
    padding: 24px;
    background: rgba(25, 30, 28, 0.32);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .delete-confirm-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .delete-confirm-card {
    width: min(840px, calc(100vw - 48px));
    min-height: 300px;
    border-radius: 30px;
    background: #fff;
    box-shadow: 0 24px 60px rgba(23, 33, 31, 0.2);
    display: flex;
    flex-direction: column;
    padding: 52px 48px 46px;
    transform: translateY(14px) scale(0.98);
    transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .delete-confirm-overlay.active .delete-confirm-card {
    transform: translateY(0) scale(1);
  }
  .delete-confirm-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
  }
  .delete-confirm-title {
    display: flex;
    align-items: center;
    gap: 20px;
    color: #17312d;
    font-size: 30px;
    line-height: 1.2;
    font-weight: 700;
  }
  .delete-confirm-mark {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #ff5b22;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 29px;
    line-height: 1;
    font-weight: 700;
    flex: 0 0 auto;
  }
  .delete-confirm-close {
    width: 46px;
    height: 46px;
    border: 0;
    border-radius: 50%;
    background: transparent;
    color: #8c9296;
    display: grid;
    place-items: center;
    cursor: pointer;
  }
  .delete-confirm-close:hover {
    background: #f4f5f5;
    color: #263331;
  }
  .delete-confirm-close svg {
    width: 34px;
    height: 34px;
  }
  .delete-confirm-body {
    margin: 38px 0 50px;
    padding-left: 0;
    color: #1f2d3a;
    font-size: 28px;
    line-height: 1.4;
    font-weight: 400;
  }
  .delete-confirm-actions {
    margin-top: auto;
    display: flex;
    justify-content: flex-end;
    gap: 16px;
  }
  .delete-confirm-btn {
    min-width: 180px;
    height: 72px;
    border-radius: 36px;
    border: 1.5px solid #006346;
    background: #fff;
    color: #006346;
    font-size: 26px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .delete-confirm-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(0, 99, 70, 0.12);
  }
  .delete-confirm-btn.danger {
    border-color: #ff5b22;
    background: #ff5b22;
    color: #fff;
  }
  .delete-confirm-btn.danger:hover {
    background: #f14f19;
    box-shadow: 0 8px 18px rgba(255, 91, 34, 0.22);
  }

  /* 空态 */
  .empty {
    grid-column: 1 / -1;
    padding: 60px 0;
    text-align: center;
    color: var(--text-3);
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .empty svg { width: 36px; height: 36px; color: var(--muted); opacity: 0.6; }
  .empty-title { font-size: 14px; color: var(--text-2); }
  .empty-cta {
    margin-top: 8px;
    padding: 8px 16px;
    background: var(--ink); color: #fff;
    border: 0; border-radius: 8px;
    font-size: 13px; cursor: pointer;
  }

  /* 响应式 */
  @media (max-width: 1280px) {
    .grid-wrap, .page-head-tabs { padding-left: 28px; padding-right: 28px; }
  }
  @media (max-width: 1080px) {
    .content-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 760px) {
    .content-grid { grid-template-columns: 1fr; }
    .app-meta-grid { grid-template-columns: 1fr; }
    .delete-confirm-card {
      min-height: auto;
      border-radius: 22px;
      padding: 28px 24px 24px;
    }
    .delete-confirm-title {
      gap: 12px;
      font-size: 22px;
    }
    .delete-confirm-mark {
      width: 32px;
      height: 32px;
      font-size: 23px;
    }
    .delete-confirm-close {
      width: 38px;
      height: 38px;
    }
    .delete-confirm-body {
      margin: 24px 0 34px;
      font-size: 18px;
    }
    .delete-confirm-actions {
      gap: 10px;
    }
    .delete-confirm-btn {
      min-width: 0;
      flex: 1;
      height: 52px;
      font-size: 17px;
    }
  }
</style>

<body data-page="my-apps">

<div class="app">
  <aside id="feixiang-sidebar"></aside>

  <main class="main">
    <header class="page-header" data-page-header="my-apps" data-scroll-target=".main">
      <div class="ph-left">
        <i class="ph-icon" data-lucide="layout-grid"></i>
        <h1 class="ph-title">我的作品</h1>
      </div>

    <div class="page-head-tabs">
      <div class="subject-tabs" id="category-tabs">
        <button class="subject-tab active" data-cat="all">全部作品</button>
        <button class="subject-tab" data-cat="courseware">我的课件</button>
        <button class="subject-tab" data-cat="apps">我的应用</button>
        <button class="subject-tab" data-cat="favorites">我的收藏</button>
      </div>
    </div>

    <div class="grid-wrap">
      <div class="content-grid" id="grid"></div>
    </div>
  </main>
</div>

<!-- ===== 创建应用模态弹窗 ===== -->
<div class="modal-overlay" id="create-app-modal">
  <div class="modal-card">
    <header class="modal-header">
      <div class="modal-title">
        <i data-lucide="plus-circle" style="color: var(--gold-deep); width: 18px; height: 18px;"></i>
        <span>创建作品</span>
      </div>
      <button class="modal-close" onclick="closeCreateModal()">
        <i data-lucide="x" style="width: 16px; height: 16px;"></i>
      </button>
    </header>
    <main class="modal-body">
      <div class="form-group">
        <label class="form-label" for="app-name-input">内容名称</label>
        <input type="text" class="form-input" id="app-name-input" placeholder="例如：古诗词背诵 Agent" maxlength="15">
      </div>
      <div class="form-group">
        <label class="form-label" for="app-desc-input">内容简介</label>
        <textarea class="form-textarea" id="app-desc-input" placeholder="简要描述这份内容，方便日常查找..." maxlength="60"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">选择图标</label>
        <div class="selection-grid" id="icon-selector"></div>
      </div>
      <div class="form-group">
        <label class="form-label">选择主题背景</label>
        <div class="color-swatch-grid" id="color-selector"></div>
      </div>
    </main>
    <footer class="modal-footer">
      <button class="btn" onclick="closeCreateModal()">取消</button>
      <button class="btn" onclick="saveApp(true)" data-track="/click/feixiangCampusMyWorksPage/saveWork | 保存作品 | saveType#STRING,contentType#STRING">保存为草稿</button>
      <button class="btn primary" onclick="saveApp(false)" data-track="/click/feixiangCampusMyWorksPage/saveWork | 保存作品 | saveType#STRING,contentType#STRING">
        <i data-lucide="sparkles" style="width: 13px; height: 13px;"></i>
        <span>保存内容</span>
      </button>
    </footer>
  </div>
</div>

<!-- ===== 删除确认弹窗 ===== -->
<div class="delete-confirm-overlay" id="delete-confirm-modal" aria-hidden="true" onclick="handleDeleteOverlayClick(event)">
  <section class="delete-confirm-card" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
    <header class="delete-confirm-head">
      <div class="delete-confirm-title" id="delete-confirm-title">
        <span class="delete-confirm-mark" aria-hidden="true">!</span>
        <span>确认删除内容？</span>
      </div>
      <button class="delete-confirm-close" type="button" aria-label="关闭" onclick="closeDeleteConfirm()">
        <i data-lucide="x"></i>
      </button>
    </header>
    <div class="delete-confirm-body">删除后，该内容将不可恢复</div>
    <footer class="delete-confirm-actions">
      <button class="delete-confirm-btn" type="button" onclick="closeDeleteConfirm()">取消</button>
      <button class="delete-confirm-btn danger" type="button" onclick="confirmDeleteApp()" data-track="/click/feixiangCampusMyWorksPage/deleteConfirm | 确认删除作品 | contentType#STRING">确认删除</button>
    </footer>
  </section>
</div>

<script>
  /* ====== 我的空间 mock 数据 ======
     暂时只沉淀老师主动保存的课件和应用，其他 AI 生成内容回到知识库或历史对话查找 */

  function getStoredApps() {
    const stored = localStorage.getItem(MY_SPACE_STORAGE_KEY);
    const deletedTitles = getDeletedAppTitles();
    if (stored) {
      try {
        const defaultByTitle = new Map(DEFAULT_APPS.map(app => [app.title, app]));
        const validTypes = new Set(['courseware', 'apps']);
        const validSources = new Set(['created', 'added', 'favorite']);
        let shouldPersist = false;
        const apps = JSON.parse(stored)
          .filter(app => validTypes.has(app.type))
          .map(app => {
            const normalized = defaultByTitle.has(app.title)
              ? { ...defaultByTitle.get(app.title), ...app }
              : app;
            if (defaultByTitle.get(app.title)?.source === 'favorite' && normalized.source === 'added') {
              shouldPersist = true;
              return { ...normalized, source: 'favorite' };
            }
            if (!validSources.has(normalized.source)) {
              shouldPersist = true;
              return { ...normalized, source: 'added' };
            }
            return normalized;
          });
        const existingTitles = new Set(apps.map(app => app.title));
        const missingDefaults = DEFAULT_APPS.filter(app => !existingTitles.has(app.title) && !deletedTitles.has(app.title));
        if (missingDefaults.length) {
          const mergedApps = [...apps, ...missingDefaults];
          localStorage.setItem(MY_SPACE_STORAGE_KEY, JSON.stringify(mergedApps));
          return mergedApps;
        }
        if (shouldPersist) {
          localStorage.setItem(MY_SPACE_STORAGE_KEY, JSON.stringify(apps));
        }
        return apps;
      } catch (e) {
        console.error('Failed to parse FEIXIANG_MY_SPACE', e);
      }
    }
    // Initialize storage with DEFAULT_APPS
    const visibleDefaults = DEFAULT_APPS.filter(app => !deletedTitles.has(app.title));
    localStorage.setItem(MY_SPACE_STORAGE_KEY, JSON.stringify(visibleDefaults));
    return visibleDefaults;
  }

    let list = allApps.filter(a => a.source !== 'favorite');
    if (filter === 'courseware') list = allApps.filter(a => a.type === 'courseware' && a.source !== 'favorite');
    if (filter === 'apps') list = allApps.filter(a => a.type === 'apps' && a.source !== 'favorite');
    if (filter === 'favorites') list = allApps.filter(a => a.source === 'favorite');

    const renderKey = JSON.stringify({
      filter,
      items: list.map(app => [app.title, app.type, app.source, app.status, app.favorites])

  function saveApp(isDraft) {
    const nameInput = document.getElementById('app-name-input');
    const descInput = document.getElementById('app-desc-input');
    const title = nameInput.value.trim();
    const desc = descInput.value.trim();

    if (!title) {
      alert('请输入应用名称！');
      return;
    }
    if (!desc) {
      alert('请输入应用描述！');
      return;
    }

    let apps = getStoredApps();

    if (editingAppTitle) {
      if (editingAppTitle !== title && apps.some(a => a.title === title)) {
        alert('已存在同名应用，请换个名字！');
        return;
      }
      const appIndex = apps.findIndex(a => a.title === editingAppTitle);
      if (appIndex !== -1) {
        apps[appIndex].title = title;
        apps[appIndex].desc = desc;
        apps[appIndex].icon = selectedIcon;
        apps[appIndex].grad = selectedGrad;
        apps[appIndex].status = isDraft ? 'draft' : 'published';
      }
      editingAppTitle = null;
      showToast(`内容「${title}」已成功更新`);
    } else {
      if (apps.some(a => a.title === title)) {
        alert('已存在同名应用，请换个名字！');
        return;
      }
      const newApp = {
        title: title,
        desc: desc,
        type: 'apps',
        source: 'created',
        origin: '张老师',
        icon: selectedIcon,
        grad: selectedGrad,
        lastUsed: '刚刚',
        status: isDraft ? 'draft' : 'published',
        views: 0,
        favorites: 0,
        href: '#'
      };
      apps.unshift(newApp);
      showToast(isDraft ? `草稿「${title}」已保存` : `内容「${title}」已保存`);
    }

    saveStoredApps(apps);
    closeCreateModal();

    const activeTab = 'apps';
    const tabEl = document.querySelector(`.subject-tab[data-cat="${activeTab}"]`);
    if (tabEl) {
      tabEl.click();
    } else {
      renderCards('apps');
    }

    document.querySelector('.grid-wrap').scrollIntoView({ behavior: 'smooth' });
  }

  function editApp(title) {
    const apps = getStoredApps();
    const app = apps.find(a => a.title === title);
    if (!app) return;

    editingAppTitle = title;
    document.getElementById('app-name-input').value = app.title;
    document.getElementById('app-desc-input').value = app.desc;
    
    selectedIcon = app.icon;
    selectedGrad = app.grad;
    initModalSelectors();

    document.querySelector('.modal-title span').textContent = '编辑作品';
    document.getElementById('create-app-modal').classList.add('active');
  }

  function deleteApp(title) {
    pendingDeleteTitle = title;
    const modal = document.getElementById('delete-confirm-modal');
    modal.classList.add('active');
    modal.setAttribute('aria-hidden', 'false');
    if (window.lucide) lucide.createIcons();
  }

  function closeDeleteConfirm() {
    pendingDeleteTitle = null;
    const modal = document.getElementById('delete-confirm-modal');
    modal.classList.remove('active');
    modal.setAttribute('aria-hidden', 'true');
  }

  function handleDeleteOverlayClick(event) {
    if (event.target.id === 'delete-confirm-modal') closeDeleteConfirm();
  }

  function confirmDeleteApp() {
    if (!pendingDeleteTitle) return;
    const title = pendingDeleteTitle;
    let apps = getStoredApps();
    rememberDeletedApp(title);
    apps = apps.filter(a => a.title !== title);
    saveStoredApps(apps);
    showToast(`已删除内容「${title}」`);
    closeDeleteConfirm();
    const active = document.querySelector('.subject-tab.active')?.dataset.cat || 'all';
    renderCards(active);
  }

  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') closeDeleteConfirm();
  });

  function removeAddedApp(title) {
    let apps = getStoredApps();
    apps = apps.filter(a => a.title !== title);
    saveStoredApps(apps);
    showToast(`已移出「${title}」`);
    const active = document.querySelector('.subject-tab.active')?.dataset.cat || 'all';
    renderCards(active);
  }

  function removeFavoriteApp(title) {
    let apps = getStoredApps();
    apps = apps.filter(a => a.title !== title);
    saveStoredApps(apps);
    showToast(`已取消收藏「${title}」`);
    const active = document.querySelector('.subject-tab.active')?.dataset.cat || 'all';
    renderCards(active);
  }

  // 初始渲染
  renderCards('all');
</script>
