<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞象老师校园版 · 工作动态</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="assets/v28.css?v=20260521d" />
<link rel="stylesheet" href="assets/feixiang-shell.css" />
<link rel="stylesheet" href="assets/page-header.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wf-page {
    padding: 24px 40px 64px;
  }
  .wf-container {
    width: min(1080px, 100%);
    margin: 0 auto;
  }
  .wf-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 12px;
  }
  .wf-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .wf-item {
    width: 100%;
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) auto;
    align-items: center;
    gap: 14px;
    padding: 15px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    text-align: left;
    color: inherit;
    cursor: pointer;
    transition: border-color .16s, box-shadow .16s, transform .16s;
  }
  .wf-item:hover {
    border-color: var(--line-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,.05);
    transform: translateY(-1px);
  }
  .wf-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    color: var(--gold);
    background: var(--gold-bg);
  }
  .wf-icon i { width: 19px; height: 19px; }
  .wf-icon.rose { color: #B85F73; background: #F9EEF1; }
  .wf-icon.green { color: #4D8B69; background: #EAF5EF; }
  .wf-icon.blue { color: #53759E; background: #EEF5FB; }
  .wf-icon.purple { color: #815995; background: #F4EEF7; }
  .wf-main { min-width: 0; }
  .wf-title {
    color: var(--text-1);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wf-meta {
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .wf-tag {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 8px;
    border-radius: 999px;
    background: var(--bg);
    color: var(--text-2);
    font-weight: 700;
  }
  .wf-tag.todo { color: #B85F73; background: #F9EEF1; }
  .wf-tag.unread { color: #A87E2C; background: #FFF6DF; }
  .wf-tag.done { color: #4D8B69; background: #EAF5EF; }
  .wf-arrow {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: var(--muted);
    background: transparent;
  }
  .wf-arrow i { width: 15px; height: 15px; }
  .wf-empty {
    display: none;
    padding: 54px 16px;
    border: 1px dashed var(--line);
    border-radius: 14px;
    background: rgba(255,255,255,.72);
    text-align: center;
  }
  .wf-empty-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-1);
  }
  .wf-empty-desc {
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .wf-list.is-empty { display: none; }
  .wf-empty.is-show { display: block; }

  @media (max-width: 900px) {
    .wf-page { padding: 18px 18px 48px; }
    .wf-item { grid-template-columns: 36px minmax(0, 1fr) auto; padding: 13px; }
    .wf-icon { width: 36px; height: 36px; }
  }
</style>
<link rel="stylesheet" href="assets/review.css" />
</head>
<body data-page="work-feed">

<div class="app" id="app" data-view="wiki" data-chat="closed">
  <aside class="sidebar-left" id="feixiang-sidebar"></aside>

  <main class="workspace">
    <header class="page-header" data-page-header="work-feed">
      <div class="ph-left">
        <i class="ph-icon" data-lucide="list-checks"></i>
        <h1 class="ph-title">工作动态</h1>
        <span class="ph-subtitle">聚合待处理任务、通知结果和应用动态</span>
      </div>
    </header>

    <div class="workspace-scroll">
      <section class="wf-page">
        <div class="wf-container">
          <div class="wf-summary">
            <span id="wf-count">共 0 条动态</span>
            <span>按优先级与更新时间排序</span>
          </div>

          <div class="wf-list" id="wf-list"></div>
          <div class="wf-empty" id="wf-empty">
            <div class="wf-empty-title">暂无工作动态</div>
            <div class="wf-empty-desc">有新的待处理任务或重要通知后会显示在这里</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <aside class="sidebar-right"></aside>
</div>

<div id="toast"></div>

<script>
  const WORK_FEED_ITEMS = [
    { id: 'homework-scan', title: '高一(3)班 · 语文期中模拟卷', desc: '38 份待批改 · 包含作文', sourceLabel: '飞象作业', status: 'todo', statusLabel: '刚刚扫描', time: '2 分钟前', url: 'ai-review.html', icon: 'book-open', color: 'rose', priority: 1 },
    { id: 'essay-scan', title: '高一(5)班 ·《荷塘月色》作文练习', desc: '42 篇作文待确认批改', sourceLabel: '飞象作文', status: 'todo', statusLabel: '待确认', time: '10 分钟前', url: 'chat.html?resume=1', icon: 'square-pen', color: 'green', priority: 2 },
    { id: 'diagnosis-report', title: '高二(2)班 · 文言文专项测验错因报告', desc: '班级错因分析已生成，待查看', sourceLabel: '错因诊断', status: 'done', statusLabel: '报告已生成', time: '32 分钟前', url: 'ai-review.html', icon: 'chart-line', color: 'blue', priority: 3 },
    { id: 'record-confirm', title: '《期中模拟卷》AI 录题完成', desc: '已识别 36 道题，待确认入库', sourceLabel: 'AI 录题', status: 'todo', statusLabel: '待确认', time: '1 小时前', url: 'ai-record-jobs.html', icon: 'scan-line', color: 'purple', priority: 4 },
    { id: 'kb-processed', title: '《高一语文复习资料》处理完成', desc: 'AI 已完成解析，可查看摘要与标签', sourceLabel: '知识库文件', status: 'done', statusLabel: '处理完成', time: '今天 09:30', url: 'file-preview.html', icon: 'file-check-2', color: '', priority: 5 }
  ];

  function renderWorkFeed() {
    const list = document.getElementById('wf-list');
    const empty = document.getElementById('wf-empty');
    const count = document.getElementById('wf-count');
    const items = WORK_FEED_ITEMS
      .sort((a, b) => a.priority - b.priority);

    count.textContent = `共 ${items.length} 条动态`;
    list.classList.toggle('is-empty', items.length === 0);
    empty.classList.toggle('is-show', items.length === 0);
    list.innerHTML = items.map((item) => `
      <button class="wf-item" onclick="window.location.href='${item.url}'">
        <span class="wf-icon ${item.color}"><i data-lucide="${item.icon}"></i></span>
        <span class="wf-main">
          <span class="wf-title">${item.title}</span>
          <span class="wf-meta">
            <span class="wf-tag ${item.status}">${item.statusLabel}</span>
            <span>${item.sourceLabel}</span>
            <span>${item.desc}</span>
            <span>${item.time}</span>
          </span>
        </span>
        <span class="wf-arrow"><i data-lucide="chevron-right"></i></span>
      </button>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', renderWorkFeed);
</script>
