<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wf-page {
    padding: 24px 40px 64px;
  }
  .wf-container {
    width: min(1080px, 100%);
    margin: 0 auto;
  }
  .wf-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    color: var(--muted);
    font-size: 12px;
  }
  .wf-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .wf-item {
    width: 100%;
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) auto;
    align-items: center;
    gap: 14px;
    padding: 15px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    text-align: left;
    color: inherit;
    cursor: pointer;
    transition: border-color .16s, box-shadow .16s, transform .16s;
  }
  .wf-item:hover {
    border-color: var(--line-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,.05);
    transform: translateY(-1px);
  }
  .wf-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    color: var(--gold);
    background: var(--gold-bg);
  }
  .wf-icon i { width: 19px; height: 19px; }
  .wf-icon.rose { color: #B85F73; background: #F9EEF1; }
  .wf-icon.green { color: #4D8B69; background: #EAF5EF; }
  .wf-icon.blue { color: #53759E; background: #EEF5FB; }
  .wf-icon.purple { color: #815995; background: #F4EEF7; }
  .wf-main { min-width: 0; }
  .wf-title {
    color: var(--text-1);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wf-meta {
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .wf-arrow {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    color: var(--muted);
    background: transparent;
  }
  .wf-arrow i { width: 15px; height: 15px; }
  .wf-empty {
    display: none;
    padding: 54px 16px;
    border: 1px dashed var(--line);
    border-radius: 14px;
    background: rgba(255,255,255,.72);
    text-align: center;
  }
  .wf-empty-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-1);
  }
  .wf-empty-desc {
    margin-top: 6px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .wf-list.is-empty { display: none; }
  .wf-empty.is-show { display: block; }

  @media (max-width: 900px) {
    .wf-page { padding: 18px 18px 48px; }
    .wf-item { grid-template-columns: 36px minmax(0, 1fr) auto; padding: 13px; }
    .wf-icon { width: 36px; height: 36px; }
  }
</style>
<link rel="stylesheet" href="assets/review.css" />

  </main>

</div>

<script>
  const WORK_FEED_ITEMS = [
    { id: 'homework-scan', title: '八 数据的表示和分析 第4课时 平均数的再认识', desc: '五年级8班 · 提交 15/42', url: 'homework-insight.html', icon: 'book-open', color: 'rose', priority: 1 },
    { id: 'essay-scan', title: '成长路上，请以《你是美好的代名词》为题', desc: '3 个班 · 126 篇待确认', url: 'essay-insight.html', icon: 'square-pen', color: 'green', priority: 3 },
    { id: 'essay-review', title: '如果那一天可以重来，你会停留、回头还是前行？', desc: '9 个班 · 76 份批改待确认', url: 'essay-insight.html', icon: 'square-pen', color: 'green', priority: 4 },
    { id: 'record-confirm', title: '《期中模拟卷》', desc: 'AI 录题 · 解析完成 · 共 36 题', url: 'ai-review.html', icon: 'scan-line', color: 'purple', priority: 5 },
    { id: 'record-failed', title: '《函数单元练习》', desc: 'AI 录题 · 解析失败', url: 'ai-record-jobs.html', icon: 'scan-line', color: 'purple', priority: 6 }
  ];

  function renderWorkFeed() {
    const list = document.getElementById('wf-list');
    const empty = document.getElementById('wf-empty');
    const count = document.getElementById('wf-count');
    const items = WORK_FEED_ITEMS
      .sort((a, b) => a.priority - b.priority);

    count.textContent = `共 ${items.length} 条动态`;
    list.classList.toggle('is-empty', items.length === 0);
    empty.classList.toggle('is-show', items.length === 0);
    list.innerHTML = items.map((item) => `
      <button class="wf-item" onclick="window.location.href='${item.url}'" data-track="/click/feixiangCampusWorkFeedPage/openFeedItem | 打开工作动态 | targetPage#STRING">
        <span class="wf-icon ${item.color}"><i data-lucide="${item.icon}"></i></span>
        <span class="wf-main">
          <span class="wf-title">${item.title}</span>
          <span class="wf-meta">
            <span>${item.desc}</span>
          </span>
        </span>
        <span class="wf-arrow"><i data-lucide="chevron-right"></i></span>
      </button>
    `).join('');
    if (window.lucide) lucide.createIcons();
  }

  document.addEventListener('DOMContentLoaded', renderWorkFeed);
</script>
