<body>
<div class="page">
  <header class="topbar">
    <a class="brand" href="product-intro.html" aria-label="返回飞象老师校园版官网">
      <span class="brand-mark"><i data-lucide="sparkles"></i></span>
      <span>飞象老师校园版</span>
    </a>
  </header>

  <main class="main">
    <section class="school-panel" aria-labelledby="school-title">
      <div>
        <div class="school-badge"><i data-lucide="school"></i></div>
        <div class="eyebrow">学校专属入口</div>
        <h1 id="school-title"><span id="schoolName">北京市实验中学</span>老师登录</h1>
        <p class="lead">使用手机号进入本校飞象老师空间。登录页支持按学校配置校徽、校训和封面图。</p>
      </div>
      <div class="custom-note"><i data-lucide="settings-2"></i><span>管理员 C 端可设置校徽、校训与封面图。</span></div>
    </section>

    <section class="login-card" aria-labelledby="login-title">
      <div class="card-head">
        <div class="card-title" id="login-title">手机号验证码登录</div>
      </div>
      <div class="card-body">
        <div class="field-grid">
          <div class="field">
            <label for="phoneInput">手机号</label>
            <input id="phoneInput" inputmode="numeric" value="13800138012" />
            <div class="error-text" id="phoneError"></div>
          </div>
          <div class="field">
            <label for="codeInput">验证码</label>
            <div class="code-row">
              <input id="codeInput" inputmode="numeric" placeholder="输入 6 位验证码" />
              <button class="btn" type="button" onclick="sendCode()"><i data-lucide="message-circle"></i>获取验证码</button>
            </div>
            <div class="error-text" id="codeError"></div>
          </div>
        </div>
        <button class="btn primary" type="button" onclick="enterCampus()" data-track="/click/feixiangCampusLoginPage/login | 点击登录 | 无"><i data-lucide="arrow-right"></i>登录</button>
        <label class="agreement">
          <input id="agreementInput" type="checkbox" />
          <span>已阅读并同意飞象老师校园版的<a href="javascript:void(0)" onclick="showToast('（演示）打开用户协议')">《用户协议》</a>和<a href="javascript:void(0)" onclick="showToast('（演示）打开隐私政策')">《隐私政策》</a></span>
        </label>
        <div class="demo-state" aria-label="登录错误状态演示">
          <div class="demo-state-title">演示状态</div>
          <div class="demo-state-options">
            <button class="active" type="button" data-state="normal" onclick="setLoginState('normal', this)">正常登录</button>
            <button type="button" data-state="code-error" onclick="setLoginState('code-error', this)">验证码错误</button>
            <button type="button" data-state="code-expired" onclick="setLoginState('code-expired', this)">验证码过期</button>
            <button type="button" data-state="account-blocked" onclick="setLoginState('account-blocked', this)">账号异常</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>
<script>
  let toastTimer = null;
  let demoLoginState = 'normal';
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.style.opacity = '0', 2200);
  }

  function applySchoolConfig() {
    const params = new URLSearchParams(window.location.search);
    const school = params.get('school') || '北京市实验中学';
    document.getElementById('schoolName').textContent = school;
    document.title = school + ' · 飞象老师校园版登录';
    if (params.get('logout') === '1') {
      setTimeout(() => showToast('已退出校园版登录，个人版登录态保持不变'), 120);
    }
  }

  function normalizePhone() {
    return document.getElementById('phoneInput').value.replace(/\s/g, '');
  }

  function setLoginState(state, button) {
    demoLoginState = state;
    document.querySelectorAll('.demo-state-options button').forEach((item) => item.classList.remove('active'));
    if (button) button.classList.add('active');
    clearErrors();
  }

  function clearErrors() {
    document.querySelectorAll('.field').forEach((field) => field.classList.remove('error'));
    document.getElementById('phoneError').textContent = '';
    document.getElementById('codeError').textContent = '';
    document.getElementById('agreementInput').closest('.agreement').classList.remove('error');
  }

  function setFieldError(inputId, message) {
    const input = document.getElementById(inputId);
    input.closest('.field').classList.add('error');
    document.getElementById(inputId === 'phoneInput' ? 'phoneError' : 'codeError').textContent = message;
  }

  function validatePhone() {
    const phone = normalizePhone();
    if (!phone) {
      setFieldError('phoneInput', '请输入手机号。');
      return false;
    }
    if (!/^1\d{10}$/.test(phone)) {
      setFieldError('phoneInput', '请输入 11 位中国大陆手机号。');
      return false;
    }
    return true;
  }

  function validateAgreement() {
    const agreement = document.getElementById('agreementInput');
    if (!agreement.checked) {
      agreement.closest('.agreement').classList.add('error');
      showToast('请先阅读并同意《用户协议》和《隐私政策》。');
      return false;
    }
    return true;
  }

  function sendCode() {
    clearErrors();
    if (!validatePhone()) return;
    showToast('验证码已发送');
  }

  function enterCampus() {
    clearErrors();
    if (!validatePhone()) return;
    if (!validateAgreement()) return;
    if (demoLoginState === 'code-error') {
      setFieldError('codeInput', '验证码不正确，请重新输入。');
      return;
    }
    if (demoLoginState === 'code-expired') {
      setFieldError('codeInput', '验证码已过期，请重新获取。');
      return;
    }
    if (demoLoginState === 'account-blocked') {
      showToast('当前手机号暂未开通校园版或账号状态异常，请联系学校管理员。');
      return;
    }
    showToast('登录成功，正在进入校园版');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 420);
  }

  applySchoolConfig();
  if (window.lucide) lucide.createIcons();
</script>
