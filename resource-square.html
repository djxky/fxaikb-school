<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞象老师校园版 · 资源广场</title>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="stylesheet" href="assets/feixiang-shell.css" />
<link rel="stylesheet" href="assets/page-header.css" />
<link rel="stylesheet" href="assets/ai-create-dock.css" />
<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --ink: #111110;
    --muted: #6b6a65;
    --faint: #a19f99;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.12);
    --gold: #a87e2c;
    --gold-soft: #fbf5e6;
    --green: #4a755b;
    --green-soft: #eaf3ed;
    --blue: #53759e;
    --blue-soft: #edf3f8;
    --purple: #81628f;
    --purple-soft: #f4eff5;
    --rose: #a8626c;
    --rose-soft: #f8eff0;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; border: 0; background: none; outline: 0; }
  button { cursor: pointer; transition: all 0.2s ease; }

  .app { height: 100vh; display: grid; grid-template-columns: 240px minmax(0, 1fr); }
  .main {
    display: flex; flex-direction: column;
    overflow-y: auto;
  }

  /* ===== page-header 在资源广场页不吸顶 · 标题区随滚动消失 =====
     浏览资源时关心的是"我在哪个学科"，不是"页面叫什么" */
  .page-header[data-page-header="resource-square"] {
    position: static;
  }

  /* ===== 学科 Tab 栏 · 吸顶（带搜索 + 发布资源） ===== */
  .page-head-tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 0 40px;
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    background: rgba(255, 255, 255, 0.92);
  }
  .tabs-row {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 0;
  }
  .tabs-row .subject-tabs {
    flex: 1 1 auto;
    min-width: 0;
    padding-bottom: 0;
  }
  .tabs-row .head-actions {
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .head-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .page-title-wrap { display: flex; flex-direction: column; gap: 4px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .page-subtitle { font-size: 13px; color: var(--muted); }

  .head-actions { display: flex; align-items: center; gap: 10px; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 22px;
    width: 280px;
    transition: all 0.2s;
  }
  .search-box:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(168,126,44,0.08); }
  .search-box input { flex: 1; font-size: 13px; min-width: 0; }
  .search-box input::placeholder { color: var(--faint); }
  .search-box svg { color: var(--faint); flex-shrink: 0; }

  .upload-btn {
    background: var(--ink); color: #fff;
    padding: 8px 16px; border-radius: 22px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
  }
  .upload-btn:hover { background: #000; }

  /* ===== 学科 Tab 横向 ===== */
  .subject-tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .subject-tabs::-webkit-scrollbar { display: none; }
  .subject-tab {
    padding: 8px 18px;
    border-radius: 18px;
    font-size: 13.5px; font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.2s;
  }
  .subject-tab:hover { color: var(--ink); background: var(--bg); }
  .subject-tab.active {
    color: var(--gold);
    background: var(--gold-soft);
    font-weight: 600;
  }
  .new-badge {
    background: #e65252; color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 4px; border-radius: 3px;
    line-height: 1.4;
  }

  /* ===== 卡片网格 ===== */
  .grid-wrap { padding: 28px 40px 60px; max-width: 1480px; margin: 0 auto; width: 100%; }
  .content-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

	  .card {
	    background: var(--surface); border: 1px solid var(--line);
	    border-radius: var(--radius-lg); overflow: hidden;
	    display: flex; flex-direction: column;
	    text-align: left;
	    cursor: pointer;
	    transition: all 0.25s;
	    text-decoration: none; color: inherit;
	  }
  .card:hover {
    border-color: var(--line-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  .card-cover {
    height: 130px; position: relative;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.85);
  }
  .card-cover.mint   { background: linear-gradient(135deg, #edf5ee, #c8e0cd); }
  .card-cover.lilac  { background: linear-gradient(135deg, #f5f0f6, #ddc8e3); }
  .card-cover.sky    { background: linear-gradient(135deg, #eff4f9, #c8d8e8); }
  .card-cover.cream  { background: linear-gradient(135deg, #fdfaf3, #f0deb3); }
  .card-cover.coral  { background: linear-gradient(135deg, #fbf0f1, #ecc7ca); }
  .card-cover.sand   { background: linear-gradient(135deg, #f7f2e8, #e3d4ae); }
  .card-cover.mist   { background: linear-gradient(135deg, #f1f3f5, #cdd5dd); }
  .card-cover.peach  { background: linear-gradient(135deg, #fbf3eb, #f0d3b8); }

  .card-cover-icon {
    opacity: 0.45;
  }
  .card-cover-icon svg { width: 38px; height: 38px; }

  .card-tag {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; color: var(--ink);
  }
  .card-tag.gold { color: var(--gold); }
  .card-stats {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    padding: 3px 8px; border-radius: 6px;
    font-size: 10.5px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }

  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 40px;
  }
  .card-author {
    margin-top: auto; display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    padding-top: 4px;
  }
  .author-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--line-strong);
    display: grid; place-items: center;
    font-size: 11px; color: #fff; font-weight: 600;
    flex-shrink: 0;
  }
  .card-author-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-fav {
    display: flex; align-items: center; gap: 3px;
    color: var(--faint);
    flex-shrink: 0;
  }
  .card-fav svg { width: 12px; height: 12px; }

  /* ===== 响应式 ===== */
  @media (max-width: 1280px) {
    .content-grid { grid-template-columns: repeat(3, 1fr); }
    .grid-wrap, .page-head { padding-left: 28px; padding-right: 28px; }
  }
  @media (max-width: 960px) {
    .content-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app">
  <aside id="feixiang-sidebar"></aside>

  <main class="main">
    <!-- 统一页面顶栏 · page-header（在本页不吸顶，随滚动消失） -->
    <header class="page-header" data-page-header="resource-square" data-scroll-target=".main">
      <div class="ph-left">
        <i class="ph-icon" data-lucide="layout-grid"></i>
        <h1 class="ph-title">资源广场</h1>
      </div>
    </header>

    <!-- 学科 Tab 栏 · 吸顶 · 内含搜索 + 发布资源 -->
    <div class="page-head-tabs">
      <div class="tabs-row">
        <div class="subject-tabs" id="subject-tabs">
        <button class="subject-tab active" data-subject="all">推荐</button>
        <button class="subject-tab" data-subject="chinese">语文</button>
        <button class="subject-tab" data-subject="math">数学<span class="new-badge">NEW</span></button>
        <button class="subject-tab" data-subject="english">英语</button>
        <button class="subject-tab" data-subject="physics">物理</button>
        <button class="subject-tab" data-subject="chemistry">化学</button>
        <button class="subject-tab" data-subject="biology">生物</button>
        <button class="subject-tab" data-subject="history">历史</button>
        <button class="subject-tab" data-subject="geography">地理</button>
        <button class="subject-tab" data-subject="politics">政治</button>
        <button class="subject-tab" data-subject="it">信息技术</button>
        <button class="subject-tab" data-subject="art">艺术体育</button>
        </div>
        <div class="head-actions">
          <label class="ph-search">
            <i data-lucide="search"></i>
            <input type="text" placeholder="搜索资源、作者…">
          </label>
          <button class="ph-action is-primary" onclick="alert('（演示）发布资源')">
            <i data-lucide="upload"></i><span>发布资源</span>
          </button>
        </div>
      </div>
    </div>

    <div class="grid-wrap">
      <div class="content-grid" id="grid">
        <!-- 16 张卡片由下方 JS 渲染 -->
      </div>
    </div>

    <!-- 给 dock 让出底部空间 -->
    <div class="ai-dock-spacer"></div>
  </main>

  <!-- AI 创造入口 · 浏览-创造闭环 -->
  <aside class="ai-dock"
         data-kind="资源"
         data-placeholders="描述你想要的资源,例如:给八(3)班做一份二次函数互动动画|出 5 道分层练习,一元二次方程,A/B/C 三难度|把这周月考错题做成 10 分钟讲评 PPT|做一个文言虚词配对小游戏,初三用|整理一份《荷塘月色》画面捕捉法的课堂活动">
    <span class="ai-dock-tag" title="把你想要的资源说出来,AI 帮你生成">
      <i data-lucide="sparkles"></i>
      <span>AI 资源生成</span>
    </span>
    <div class="ai-dock-input-wrap">
      <textarea class="ai-dock-input" rows="1" autocomplete="off"
                placeholder="描述你想要的资源…"></textarea>
    </div>
    <div class="ai-dock-actions">
      <button class="ai-dock-btn" type="button" title="语音输入" onclick="alert('（演示）语音输入')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
      </button>
      <button class="ai-dock-btn ai-dock-send" type="button" title="发送(Enter)">
        <i data-lucide="arrow-up"></i>
      </button>
    </div>
  </aside>
</div>

  function renderCards(filter = 'all') {
    const grid = document.getElementById('grid');
    const list = filter === 'all' ? RESOURCES : RESOURCES.filter(r => r.subject === filter);

    if (list.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--muted);">该学科暂无资源，敬请期待</div>';
      return;
    }

    grid.innerHTML = list.map(r => `
      <a class="card" href="resource-detail.html?resource=${encodeURIComponent(r.title)}">
        <div class="card-cover ${r.cover}">
          <span class="card-tag ${r.tagClass}">${r.tag}</span>
          <div class="card-cover-icon">${ICON_SVG[r.icon] || ''}</div>
          <span class="card-stats">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ${r.views}
          </span>
        </div>
        <div class="card-body">
          <div class="card-title">${r.title}</div>
          <div class="card-author">
            <div class="author-avatar" style="background: ${r.avatarColor}">${r.avatar}</div>
            <span class="card-author-name">${r.author}</span>
            <span class="card-fav">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 10 17 15 18 22 12 18 6 22 7 15 2 10 9 9 12 2"/></svg>
              ${r.fav}
            </span>
          </div>
        </div>
      </a>
    `).join('');
  }

  document.querySelectorAll('.subject-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.subject-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderCards(tab.dataset.subject);
    });
  });

  // 初始渲染
  renderCards('all');

  // 初始化 lucide 图标
  if (window.lucide) lucide.createIcons();
</script>

</body>
</html>
