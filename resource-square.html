<html lang="zh-CN">

<style>
  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --ink: #111110;
    --muted: #6b6a65;
    --faint: #a19f99;
    --line: rgba(0, 0, 0, 0.06);
    --line-strong: rgba(0, 0, 0, 0.12);
    --gold: #a87e2c;
    --gold-soft: #fbf5e6;
    --green: #4a755b;
    --green-soft: #eaf3ed;
    --blue: #53759e;
    --blue-soft: #edf3f8;
    --purple: #81628f;
    --purple-soft: #f4eff5;
    --rose: #a8626c;
    --rose-soft: #f8eff0;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; border: 0; background: none; outline: 0; }
  button { cursor: pointer; transition: all 0.2s ease; }

  .app { height: 100vh; display: grid; grid-template-columns: 240px minmax(0, 1fr); }
  .main {
    display: flex; flex-direction: column;
    overflow-y: auto;
  }

  /* ===== page-header 在资源广场页不吸顶 · 标题区随滚动消失 =====
     浏览资源时关心的是"我在哪个学科"，不是"页面叫什么" */
  .page-header[data-page-header="resource-square"] {
    position: static;
  }

	  /* ===== 学科 Tab 栏 · 吸顶（带搜索） ===== */
  .page-head-tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 0 40px;
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    background: rgba(255, 255, 255, 0.92);
  }
  .tabs-row {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 0;
  }
  .tabs-row .source-tabs-row {
    flex: 1 1 auto;
    min-width: 0;
    padding-bottom: 0;
  }
	  .tabs-row .head-actions {
	    display: flex; align-items: center; gap: 10px;
	    flex-shrink: 0;
	  }
  .search-shell{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .search-shell .search-submit{
    display:none;
    height:34px;
    padding:0 14px;
    border-radius:17px;
    background:var(--gold-soft);
    color:var(--gold);
    font-size:13px;
    font-weight:650;
    white-space:nowrap;
  }
  .search-shell:focus-within .search-submit,
  .search-shell.has-value .search-submit{
    display:inline-flex;
    align-items:center;
  }
  .search-shell .search-submit:hover{background:#f4e7c4}
	  .source-tabs-row {
	    display: flex; align-items: center; gap: 6px;
	    padding: 0 0 10px;
	  }
  .head-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .page-title-wrap { display: flex; flex-direction: column; gap: 4px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .page-subtitle { font-size: 13px; color: var(--muted); }

  .head-actions { display: flex; align-items: center; gap: 10px; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 22px;
    width: 280px;
    transition: all 0.2s;
  }
  .search-box:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(168,126,44,0.08); }
  .search-box input { flex: 1; font-size: 13px; min-width: 0; }
  .search-box input::placeholder { color: var(--faint); }
  .search-box svg { color: var(--faint); flex-shrink: 0; }

	  /* ===== 学科 Tab 横向 ===== */
  .subject-tabs {
    display: flex; gap: 4px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .subject-tabs::-webkit-scrollbar { display: none; }
  .subject-tab {
    padding: 8px 18px;
    border-radius: 18px;
    font-size: 13.5px; font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.2s;
  }
	  .subject-tab:hover { color: var(--ink); background: var(--bg); }
		  .subject-tab.active {
		    color: var(--gold);
		    background: var(--gold-soft);
		    font-weight: 600;
		  }
		  .advanced-filters {
		    display: none;
		    padding: 0 0 14px;
		  }
		  .advanced-filters.is-visible {
		    display: grid;
		    gap: 8px;
		  }
		  .filter-row {
		    display: flex;
		    align-items: center;
		    gap: 8px;
		    min-width: 0;
		    overflow-x: auto;
		    scrollbar-width: none;
		  }
		  .filter-row::-webkit-scrollbar { display: none; }
		  .filter-label {
		    color: var(--muted);
		    font-size: 12.5px;
		    white-space: nowrap;
		    flex: 0 0 auto;
		  }
		  .filter-chip {
		    height: 28px;
		    padding: 0 12px;
		    border-radius: 9px;
		    color: var(--muted);
		    font-size: 12.5px;
		    white-space: nowrap;
		    flex: 0 0 auto;
		  }
		  .filter-chip:hover { color: var(--ink); background: var(--bg); }
		  .filter-chip.active {
		    color: #07563f;
		    background: var(--green-soft);
		    font-weight: 600;
		  }
		  .source-tab {
		    height: 30px;
	    padding: 0 12px;
	    border-radius: 15px;
	    color: var(--muted);
	    font-size: 12.5px;
	    font-weight: 500;
	    white-space: nowrap;
	  }
	  .source-tab:hover { color: var(--ink); background: var(--bg); }
	  .source-tab.active {
	    color: var(--gold);
	    background: var(--gold-soft);
	    font-weight: 600;
	  }
  .new-badge {
    background: #e65252; color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 4px; border-radius: 3px;
    line-height: 1.4;
  }

  /* ===== 卡片网格 ===== */
  .grid-wrap { padding: 28px 40px 60px; max-width: 1480px; margin: 0 auto; width: 100%; }
  .content-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

	  .card {
	    background: var(--surface); border: 1px solid var(--line);
	    border-radius: var(--radius-lg); overflow: hidden;
	    display: flex; flex-direction: column;
	    text-align: left;
	    cursor: pointer;
	    transition: all 0.25s;
	    text-decoration: none; color: inherit;
	  }
  .card:hover {
    border-color: var(--line-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,0.06);
    transform: translateY(-2px);
  }

  .card-cover {
    height: 130px; position: relative;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.85);
  }
  .card-cover.mint   { background: linear-gradient(135deg, #edf5ee, #c8e0cd); }
  .card-cover.lilac  { background: linear-gradient(135deg, #f5f0f6, #ddc8e3); }
  .card-cover.sky    { background: linear-gradient(135deg, #eff4f9, #c8d8e8); }
  .card-cover.cream  { background: linear-gradient(135deg, #fdfaf3, #f0deb3); }
  .card-cover.coral  { background: linear-gradient(135deg, #fbf0f1, #ecc7ca); }
  .card-cover.sand   { background: linear-gradient(135deg, #f7f2e8, #e3d4ae); }
  .card-cover.mist   { background: linear-gradient(135deg, #f1f3f5, #cdd5dd); }
  .card-cover.peach  { background: linear-gradient(135deg, #fbf3eb, #f0d3b8); }

  .card-cover-icon {
    opacity: 0.45;
  }
  .card-cover-icon svg { width: 38px; height: 38px; }

  .card-tag {
    position: absolute; top: 12px; left: 12px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; color: var(--ink);
  }
  .card-tag.gold { color: var(--gold); }
  .card-stats {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    padding: 3px 8px; border-radius: 6px;
    font-size: 10.5px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }

  .card-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 40px;
  }
  .card-author {
    margin-top: auto; display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    padding-top: 4px;
  }
  .author-avatar {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--line-strong);
    display: grid; place-items: center;
    font-size: 11px; color: #fff; font-weight: 600;
    flex-shrink: 0;
  }
  .card-author-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-fav {
    display: inline-flex; align-items: center; gap: 3px;
    height: 24px;
    padding: 0 7px;
    border-radius: 7px;
    border: 0;
    background: transparent;
    color: var(--faint);
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .card-fav:hover { background: var(--bg); color: var(--gold); }
  .card-fav.is-on { background: var(--gold-soft); color: var(--gold); }
  .card-fav svg { width: 12px; height: 12px; }
  .card-fav.is-on svg { fill: currentColor; }

  /* ===== 响应式 ===== */
  @media (max-width: 1280px) {
    .content-grid { grid-template-columns: repeat(3, 1fr); }
    .grid-wrap, .page-head { padding-left: 28px; padding-right: 28px; }
  }
  @media (max-width: 960px) {
    .content-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>

	        <button type="button" class="ai-dock-upload-card">

	          <span>上传附件</span>

    <div class="ai-dock-actions">

	        <i data-lucide="arrow-up"></i>
	      </button>
	    </div>
	  </aside>
</div>

		  let currentSubject = 'all';
		  let currentSource = 'global';
		  const currentFilters = {};

		  function getSubjectsForSource(source) {
		    if (source === 'global') return FEATURED_SUBJECTS;
		    const available = new Set(
		      RESOURCES
		        .filter(resource => resource.source === source)
		        .map(resource => resource.subject)
		    );
		    return SUBJECT_ORDER.filter(subject => available.has(subject));
		  }

		  function renderSubjectTabs() {
		    const tabs = document.getElementById('subject-tabs');
		    const subjects = getSubjectsForSource(currentSource);
		    if (!subjects.includes(currentSubject)) {
		      currentSubject = subjects[0] || 'all';
		    }
		    tabs.innerHTML = subjects.map(subject => `
		      <button class="subject-tab ${subject === currentSubject ? 'active' : ''}" data-subject="${subject}">
		        ${SUBJECT_LABELS[subject] || subject}
		        ${currentSource === 'global' && subject === 'math' ? '<span class="new-badge">NEW</span>' : ''}
		      </button>
		    `).join('');
		  }

		  function renderAdvancedFilters() {
		    const filters = document.getElementById('advanced-filters');
		    const subjectFilters = FEATURED_FILTERS_BY_SUBJECT[currentSubject] || [];
		    const shouldShow = currentSource === 'global' && currentSubject !== 'all' && subjectFilters.length > 0;
		    filters.classList.toggle('is-visible', shouldShow);
		    if (!shouldShow) {
		      filters.innerHTML = '';
		      return;
		    }
		    filters.innerHTML = subjectFilters.map(filter => {
		      const activeKey = `${currentSubject}:${filter.key}`;
		      const activeValue = currentFilters[activeKey] || '不限';
		      return `
			      <div class="filter-row" data-filter="${filter.key}">
			        <span class="filter-label">${filter.label}：</span>
			        ${filter.options.map(option => `
			          <button class="filter-chip ${activeValue === option ? 'active' : ''}" data-value="${option}">
			            ${option}
			          </button>
			        `).join('')}
			      </div>
		      `;
		    }).join('');
		  }

	  function renderCards() {
	    const grid = document.getElementById('grid');
	    const list = RESOURCES.filter(r => {
	      const subjectMatched = currentSubject === 'all' || r.subject === currentSubject;
	      const sourceMatched = r.source === currentSource;
	      return subjectMatched && sourceMatched;
	    });

	    if (list.length === 0) {
	      grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 60px 0; color: var(--muted);">当前筛选暂无资源，敬请期待</div>';
	      return;
	    }

	    grid.innerHTML = list.map(r => `
      <a class="card" href="resource-detail.html?resource=${encodeURIComponent(r.title)}" data-track="/click/feixiangCampusResourceSquarePage/openResource | 打开资源 | resourceSource#STRING,contentType#STRING">
        <div class="card-cover ${r.cover}">
          <span class="card-tag ${r.tagClass}">${r.tag}</span>
          <div class="card-cover-icon">${ICON_SVG[r.icon] || ''}</div>
          <span class="card-stats">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            ${r.views}
          </span>
        </div>
        <div class="card-body">
          <div class="card-title">${r.title}</div>
          <div class="card-author">
            <div class="author-avatar" style="background: ${r.avatarColor}">${r.avatar}</div>
            <span class="card-author-name">${r.author}</span>
            <span class="card-fav" role="button" tabindex="0" data-favorite data-count="${r.fav}" title="收藏">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15 9 22 10 17 15 18 22 12 18 6 22 7 15 2 10 9 9 12 2"/></svg>
              <span>${r.fav}</span>
            </span>
          </div>
        </div>
      </a>
    `).join('');
    bindFavoriteButtons(grid);
  }

  function bindFavoriteButtons(scope){
    scope.querySelectorAll('[data-favorite]').forEach(btn => {
      btn.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        const on = btn.classList.toggle('is-on');
        const base = Number(btn.dataset.count) || 0;
        btn.querySelector('span').textContent = String(base + (on ? 1 : 0));
      });
    });
  }

		  document.getElementById('subject-tabs').addEventListener('click', event => {
		    const tab = event.target.closest('.subject-tab');
		    if (!tab) return;
		    currentSubject = tab.dataset.subject || 'all';
		    renderSubjectTabs();
		    renderAdvancedFilters();
		    renderCards();
		  });

		  document.getElementById('advanced-filters').addEventListener('click', event => {
		    const chip = event.target.closest('.filter-chip');
		    if (!chip) return;
		    const row = chip.closest('.filter-row');
		    if (!row) return;
		    currentFilters[`${currentSubject}:${row.dataset.filter}`] = chip.dataset.value || '不限';
		    renderAdvancedFilters();
		  });

	  document.querySelectorAll('.source-tab').forEach(tab => {
	    tab.addEventListener('click', () => {
		      document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
		      tab.classList.add('active');
		      currentSource = tab.dataset.source || 'global';
		      const nextSubjects = getSubjectsForSource(currentSource);
		      currentSubject = currentSource === 'global' ? 'all' : (nextSubjects[0] || 'all');
		      renderSubjectTabs();
		      renderAdvancedFilters();
		      renderCards();
		    });
		  });

		  const resourceSearch = document.getElementById('resource-search');
		  const resourceSearchShell = document.getElementById('resource-search-shell');
		  const resourceSearchSubmit = document.getElementById('resource-search-submit');
		  function updateResourceSearchState(){
		    if(!resourceSearch || !resourceSearchShell) return;
		    resourceSearchShell.classList.toggle('has-value', !!resourceSearch.value.trim());
		  }
		  function goResourceSearch(){
		    if(!resourceSearch) return;
		    const q = resourceSearch.value.trim();
		    if(!q){
		      resourceSearch.focus();
		      return;
		    }
		    const params = new URLSearchParams({ q, source: currentSource, subject: currentSubject });
		    window.location.href = `resource-search.html?${params.toString()}`;
		  }
		  if(resourceSearch){
		    resourceSearch.addEventListener('input', updateResourceSearchState);
		    resourceSearch.addEventListener('keydown', event => {
		      if(event.key === 'Enter' && !event.isComposing){
		        event.preventDefault();
		        goResourceSearch();
		      }
		    });
		  }
		  if(resourceSearchSubmit) resourceSearchSubmit.addEventListener('click', goResourceSearch);

		  // 初始渲染
		  renderSubjectTabs();
		  renderAdvancedFilters();
		  renderCards();
		  updateResourceSearchState();

  // 初始化 lucide 图标
  if (window.lucide) lucide.createIcons();
</script>
