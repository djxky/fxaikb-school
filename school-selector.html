<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>请选择学校 · 飞象老师校园版</title>
  <style>
    :root { --ink:#161614; --muted:#a7a39b; --line:#ebe7df; --page:#f8f7f3; --green:#254e3e; }
    * { box-sizing:border-box; }
    html,body { min-height:100%; margin:0; }
    body {
      display:grid;
      min-height:100vh;
      place-items:center;
      overflow-x:hidden;
      background:var(--page);
      color:var(--ink);
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    body::before,body::after {
      position:fixed;
      z-index:-1;
      color:rgba(191,166,106,.16);
      font-family:Georgia,serif;
      font-size:24px;
      letter-spacing:9px;
      line-height:1.55;
      white-space:pre;
      pointer-events:none;
      content:"⌄  ⌄  ⌄  ⌄\A⌄  ⌄  ⌄  ⌄\A  ⌄  ⌄  ⌄\A⌄  ⌄  ⌄  ⌄";
    }
    body::before { top:-18px; right:-11px; transform:rotate(-7deg); }
    body::after { bottom:-28px; left:-15px; transform:rotate(8deg); }
    .selector-card {
      width:min(900px,calc(100vw - 48px));
      min-height:590px;
      padding:74px 72px 64px;
      border:1px solid var(--line);
      border-radius:26px;
      background:rgba(255,255,255,.96);
      box-shadow:0 20px 56px rgba(57,48,34,.045);
    }
    h1 {
      margin:0;
      font-family:Georgia,"Songti SC",STSong,serif;
      font-size:38px;
      font-weight:650;
      letter-spacing:-.05em;
      line-height:1.2;
    }
    .intro { margin:17px 0 56px; color:var(--muted); font-size:18px; line-height:1.65; }
    .school-list { display:grid; gap:18px; }
    .school-option {
      position:relative;
      display:flex;
      align-items:center;
      width:100%;
      min-height:86px;
      padding:0 28px;
      border:1px solid transparent;
      border-radius:14px;
      background:#f8f8f6;
      color:#191917;
      cursor:pointer;
      text-align:left;
      transition:border-color .16s ease,background .16s ease,transform .16s ease;
    }
    .school-option:hover { border-color:#d9e3dc; background:#f5f8f5; transform:translateY(-1px); }
    .school-option.active { border-color:#749080; background:#f2f7f3; }
    .school-option.active::after {
      position:absolute;
      top:50%; right:25px;
      width:21px; height:11px;
      border-bottom:2px solid var(--green);
      border-left:2px solid var(--green);
      content:"";
      transform:translateY(-65%) rotate(-45deg);
    }
    .school-name { font-size:22px; font-weight:650; letter-spacing:-.025em; }
    .school-option:focus-visible,.enter-button:focus-visible { outline:3px solid rgba(74,117,91,.2); outline-offset:3px; }
    .enter-button {
      width:100%;
      height:74px;
      margin-top:88px;
      border:0;
      border-radius:13px;
      background:var(--green);
      color:#fff;
      cursor:pointer;
      font-family:Georgia,"Songti SC",STSong,serif;
      font-size:27px;
      font-weight:650;
      letter-spacing:-.03em;
      transition:background .16s ease,transform .16s ease;
    }
    .enter-button:hover:not(:disabled) { background:#193f31; transform:translateY(-1px); }
    .enter-button:disabled { background:#cbc9c4; cursor:not-allowed; }
    @media(max-width:680px) {
      body { display:block; }
      .selector-card { width:calc(100% - 28px); min-height:0; margin:28px auto; padding:44px 26px 32px; border-radius:20px; }
      h1 { font-size:31px; }
      .intro { margin:13px 0 38px; font-size:15px; }
      .school-option { min-height:72px; padding:0 18px; }
      .school-name { font-size:17px; }
      .enter-button { height:60px; margin-top:52px; font-size:22px; }
    }
  </style>
</head>
<body>
  <main class="selector-card" aria-labelledby="selector-title">
    <h1 id="selector-title">请选择学校</h1>
    <p class="intro">检测到当前账号属于多个学校，请选择本次进入的校园空间。</p>
    <section class="school-list" id="school-list" aria-label="可进入的学校">
      <button class="school-option" type="button" data-school="回测-QA公共测试小学"><span class="school-name">回测-QA公共测试小学</span></button>
      <button class="school-option" type="button" data-school="虹口区教育局"><span class="school-name">虹口区教育局</span></button>
    </section>
    <button class="enter-button" id="enter-school" type="button" disabled>进入学校</button>
  </main>
  <script>
    let selectedSchool = '';
    const options = [...document.querySelectorAll('.school-option')];
    const enterButton = document.getElementById('enter-school');

    options.forEach((option) => {
      option.addEventListener('click', () => {
        selectedSchool = option.dataset.school;
        options.forEach((item) => item.classList.toggle('active', item === option));
        enterButton.disabled = false;
      });
    });

    enterButton.addEventListener('click', () => {
      if (!selectedSchool) return;
      window.location.href = 'index.html?school=' + encodeURIComponent(selectedSchool) + '&firstLogin=1';
    });
  </script>
</body>
</html>
