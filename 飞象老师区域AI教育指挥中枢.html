    .amap-toolbar,.amap-toolbar .amap-zoomcontrol,.amap-toolbar .amap-zoomcontrol-plus,.amap-toolbar .amap-zoomcontrol-minus,.amap-toolbar .amap-toolbar-control{border-color:rgba(207,217,232,.32)!important;background:#3a4250!important;box-shadow:0 8px 18px rgba(0,0,0,.32)!important;transition:background .16s,border-color .16s!important}

    .amap-toolbar img{filter:grayscale(1) contrast(1.15) brightness(2.25)!important}

    @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>

  <script>
    const $ = id => document.getElementById(id);
    const fmt = value => Math.round(value).toLocaleString();
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const data = Array.from({length: 90}, (_, index) => {
      const date = new Date(today);

          }
          const delta = before.top - after.top;
          if (delta) row.animate([{transform:`translateY(${delta}px)`},{transform:'translateY(0)'}], {duration:680,easing:'cubic-bezier(.2,.72,.25,1)',fill:'both'});
        });
      };
      Array.from({length:5}).forEach(() => push(false));
      setInterval(() => push(true), 1700);
    }
    function fitFullscreen() {
      const active = Boolean(document.fullscreenElement);
      document.documentElement.classList.toggle('presentation-fullscreen', active);
      if (active) document.documentElement.style.setProperty('--fit-scale', Math.min(innerWidth / 1600, innerHeight / 900).toFixed(4));
      else document.documentElement.style.removeProperty('--fit-scale');
    }
    function boot() {
      initCharts();
      setRange(7);
      startFeed();
      initMap();
      document.querySelectorAll('.range').forEach(button => button.onclick = () => setRange(Number(button.dataset.days)));
      document.querySelectorAll('.tabset button').forEach(button => button.onclick = () => {
        document.querySelectorAll('.tabset button').forEach(item => item.classList.remove('on'));
        button.classList.add('on');
        mode = button.dataset.mode;
        updateDashboard();
      });
      $('fullscreen').onclick = () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
      addEventListener('resize', fitFullscreen);
      document.addEventListener('fullscreenchange', fitFullscreen);
    }
    boot();
  </script>
</body>
</html>
