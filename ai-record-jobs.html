<script>
  (function(){
    const RECORD_STORAGE_KEY = 'v28-ai-record-jobs';
    const root = document.getElementById('recp-list-root');
    const metaEl = document.getElementById('recp-list-meta');
    const stateSel = document.getElementById('recp-filter-state');
    const searchInp = document.getElementById('recp-search-input');
    const recordBtn = document.getElementById('recp-record-btn');

    /* —— 视图状态 —— */
    let filterState = '';
    let keyword = '';

    function localJobs(){
      try{
        const raw = localStorage.getItem(RECORD_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      }catch(_){
        return [];
      }
    }
    function saveLocalJobs(jobs){
      try{ localStorage.setItem(RECORD_STORAGE_KEY, JSON.stringify(jobs)); }catch(_){}
    }
    function stableQuestionCount(name){
      let h = 5381;
      String(name || '').split('').forEach(ch => { h = ((h * 33) ^ ch.charCodeAt(0)) >>> 0; });
      return 6 + (Math.abs(h) % 19);
    }
    function createLocalJobs(files){
      const jobs = localJobs();
      const now = Date.now();
      const created = files.map((file, index) => ({
        id: 'rec-' + Math.random().toString(36).slice(2, 10),
        fileId: file.id,
        fileName: file.name,
        fileType: file.type,
        fileSize: file.size,
        kbLabel: file.kbLabel,
        state: 'parsing',
        createdAt: now + index,
        parseDoneAt: null,
        committedAt: null,
        questionCount: stableQuestionCount(file.name),
        _parseMs: 8000 + index * 900
      }));
      saveLocalJobs(jobs.concat(created));
      scheduleLocalFinish(created);
      return created;
    }
    function scheduleLocalFinish(jobs){
      jobs.forEach(job => {
        const elapsed = Date.now() - job.createdAt;
        const left = Math.max(400, (job._parseMs || 8000) - elapsed);
        window.setTimeout(() => {
          const all = localJobs();
          const target = all.find(item => item.id === job.id);
          if(!target || target.state !== 'parsing') return;
          target.state = 'review-pending';
          target.parseDoneAt = Date.now();
          saveLocalJobs(all);
          renderList();
          if(window.V28RecordJobs && V28RecordJobs.syncTriggerBadge) V28RecordJobs.syncTriggerBadge();
          showToast(`AI 已解析完《${target.fileName}》· ${target.questionCount} 题待校对`);
        }, left);
      });
    }
    function ensureLocalParsingTimers(){
      const all = localJobs();
      let dirty = false;
      all.forEach(job => {
        if(job.state !== 'parsing') return;
        const elapsed = Date.now() - job.createdAt;
        if(elapsed >= (job._parseMs || 8000)){
          job.state = 'review-pending';
          job.parseDoneAt = Date.now();
          dirty = true;
        } else {
          scheduleLocalFinish([job]);
        }
      });
      if(dirty) saveLocalJobs(all);
    }

    /* —— 状态元数据 ——
     * 不再分组,统一按 createdAt 倒序扁平展示,避免任务在 parsing → review-pending 状态跳变时
     * 视觉位置突然变化导致老师"刚才那个任务怎么不见了"的错觉
     */
    const STATE_META = {
      'review-pending': { label:'待校对', cls:'is-pending', icon:'circle-dot',     spin:false },
      'parsing':        { label:'解析中', cls:'is-parsing', icon:'loader-2',       spin:true  },
      'failed':         { label:'失败',   cls:'is-failed',  icon:'x-circle',       spin:false },
      'committed':      { label:'已入库', cls:'is-done',    icon:'check-circle-2', spin:false }
    };

    /* —— 辅助 —— */
    function escHtml(s){
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function fmtRelTime(ts){
      if(!ts) return '';
      const delta = Date.now() - ts;
      if(delta < 60_000) return '刚刚';
      if(delta < 3600_000) return Math.floor(delta / 60_000) + ' 分钟前';
      if(delta < 86_400_000) return Math.floor(delta / 3600_000) + ' 小时前';
      return Math.floor(delta / 86_400_000) + ' 天前';
    }
    /* 解析中进度 = (已用时 / 总解析时长) 百分比，最大 95% (留 5% 给完成切换) */
    function calcProgress(job){
      if(!job._parseMs) return 0;
      const elapsed = Date.now() - job.createdAt;
      const ratio = Math.min(elapsed / job._parseMs, 0.95);
      return Math.max(2, Math.round(ratio * 100));
    }

    /* —— 列表过滤 ——
     * 排序统一按 createdAt 倒序（V28RecordJobs.list() 已经是新→旧）
     * 不再做状态分组,避免任务状态切换时跳位
     */
    function buildView(){
      const all = window.V28RecordJobs ? V28RecordJobs.list() : localJobs().sort((a, b) => b.createdAt - a.createdAt);

      const kw = keyword.trim().toLowerCase();
      const filtered = all.filter(j => {
        if(filterState && j.state !== filterState) return false;
        if(kw && !j.fileName.toLowerCase().includes(kw)) return false;
        return true;
      });

      return { all, filtered };
    }

    /* —— 渲染列表 —— */
    function renderList(){
      const { all, filtered } = buildView();

      /* 头部 meta · 总览数据保留,作为"现在状态如何"的快速感知 */
      if(metaEl){
        if(all.length === 0){
          metaEl.textContent = '';
        } else {
          const parsing = all.filter(j => j.state === 'parsing').length;
          const pending = all.filter(j => j.state === 'review-pending').length;
          const parts = [];
          if(pending) parts.push(`${pending} 个待校对`);
          if(parsing) parts.push(`${parsing} 个解析中`);
          parts.push(`共 ${all.length} 个任务`);
          metaEl.textContent = '· ' + parts.join(' · ');
        }
      }

      /* 空态 */
      if(all.length === 0){
        root.innerHTML = `
          <div class="recp-empty">
            <div class="recp-empty-icon"><i data-lucide="inbox"></i></div>
            <div class="recp-empty-title">暂无任务</div>
          </div>
        `;
        if(window.lucide) lucide.createIcons();
        return;
      }
      if(filtered.length === 0){
        root.innerHTML = `
          <div class="recp-noresult">
            <i data-lucide="folder-search"></i>没有匹配的任务，可调整筛选或搜索条件。
          </div>
        `;
        if(window.lucide) lucide.createIcons();
        return;
      }

      /* 扁平时间倒序渲染（V28RecordJobs.list 已经按 createdAt 倒序） */
      root.innerHTML = `<div class="recp-items">${filtered.map(renderItem).join('')}</div>`;
      if(window.lucide) lucide.createIcons();
      bindRowActions();
    }

    function renderItem(job){
      const meta = STATE_META[job.state];
      const ext = (job.fileType || '').toLowerCase();
      const isImage = ['jpg', 'jpeg', 'png'].includes(ext);
      const iconCls = isImage ? 'recp-item-icon--image' : (ext === 'docx' || ext === 'doc' ? 'recp-item-icon--docx' : 'recp-item-icon--pdf');
      const itemIcon = isImage ? 'image' : 'file-text';

      /* 时间 */
      const timeStr =
        job.committedAt ? `已入库 · ${fmtRelTime(job.committedAt)}` :
        job.parseDoneAt ? `解析完成 · ${fmtRelTime(job.parseDoneAt)}` :
        `提交于 ${fmtRelTime(job.createdAt)}`;

      /* 解析中进度 */
      const progressHtml = job.state === 'parsing'
        ? (() => {
            const pct = calcProgress(job);
            return `
              <div class="recp-progress">
                <div class="recp-progress-bar"><div class="recp-progress-bar-fill" style="width:${pct}%"></div></div>
                <span>${pct}%</span>
              </div>
            `;
          })()
        : '';

      /* 题数 chip */
      const qInfo = job.state !== 'parsing'
        ? `<span class="sep">·</span><span class="recp-item-meta-strong">${job.questionCount} 题</span>`
        : '';

      /* 已入库角标（在文件名右侧，提示去重） */
      const committedBadge = job.state === 'committed'
        ? `<span class="recp-committed-badge"><i data-lucide="check"></i>已入库 ${job.questionCount} 题</span>`
        : '';

      /* 操作区 */
      let actions = '';
      if(job.state === 'review-pending'){
        actions = `
          <a class="recp-item-action is-primary" href="ai-review.html?jobId=${job.id}" data-track="/click/feixiangCampusAiRecordPage/goReview | 去校对 | jobStatus#STRING">
            去校对<i data-lucide="arrow-right"></i>
          </a>
        `;
      } else if(job.state === 'committed'){
        actions = `
          <button class="recp-item-action" data-action="re-record" data-jobid="${job.id}" title="再次解析此文件，会与已入库题目合并；可能产生重复题">
            <i data-lucide="refresh-cw"></i>重新录题
          </button>
        `;
      } else if(job.state === 'failed'){
        actions = `
          <button class="recp-item-action" data-action="retry" data-jobid="${job.id}">
            <i data-lucide="rotate-cw"></i>重新解析
          </button>
        `;
      } else if(job.state === 'parsing'){
        actions = `<span class="recp-item-action is-muted">解析中…</span>`;
      }

      return `
        <div class="recp-item" data-jobid="${job.id}">
          <span class="recp-item-icon ${iconCls}"><i data-lucide="${itemIcon}"></i></span>
          <div class="recp-item-main">
            <div class="recp-item-name-line">
              <span class="recp-item-name" title="${escHtml(job.fileName)}">${escHtml(job.fileName)}</span>
              <span class="recp-item-state ${meta.cls}">
                <i data-lucide="${meta.icon}" class="${meta.spin ? 'is-spin' : ''}"></i>${meta.label}
              </span>
              ${committedBadge}
            </div>
            <div class="recp-item-sub">
              ${progressHtml}
              ${progressHtml ? '<span class="sep">·</span>' : ''}
              <span class="recp-item-kb"><i data-lucide="library"></i>来源：${escHtml(job.kbLabel || '本地上传')}</span>
              <span class="sep">·</span>
              <span>${escHtml(job.fileSize || '')}</span>
              ${qInfo}
              <span class="sep">·</span>
              <span class="recp-rel-time">${escHtml(timeStr)}</span>
            </div>
          </div>
          <div class="recp-item-actions">${actions}</div>
        </div>
      `;
    }

    function bindRowActions(){
      /* 重新录题（已入库 → 二次确认 → 再开 RecordDialog 默认勾选这个文件） */
      root.querySelectorAll('[data-action="re-record"]').forEach(el => {
        el.addEventListener('click', event => {
          event.preventDefault();
          event.stopPropagation();
          const id = el.getAttribute('data-jobid');
          const j = (window.V28RecordJobs && V28RecordJobs.get(id)) || localJobs().find(job => job.id === id);
          if(!j) return;
          if(!confirm(`《${j.fileName}》已入库 ${j.questionCount} 题。\n再次录题会与已有题目合并，可能产生重复题。\n\n确认重新录题？`)) return;
          openRecordDialog({ preselectFileIds:[j.fileId] });
        });
      });
      /* 失败重试（演示态：toast 提示） */
      root.querySelectorAll('[data-action="retry"]').forEach(el => {
        el.addEventListener('click', () => {
          showToast('（演示）失败重试由后台重新排队解析');
        });
      });
    }

    function openRecordFallback(opts){
      opts = opts || {};
      const localUploads = [];
      const selected = new Set();

      const overlay = document.createElement('div');
      overlay.className = 'v28m-overlay open';
      const dialog = document.createElement('div');
      dialog.className = 'v28m size-md open';
      dialog.dataset.doc = 'ai-record-dialog';
      dialog.innerHTML = `
        <div class="v28m-head">
          <div class="v28m-title">
            AI 录题 · 上传要解析的文件
            <div class="v28m-title-sub">仅支持 PDF / Word · 本地上传后，AI 解析为题目并进入校对任务</div>
          </div>
          <button class="v28m-close" data-close aria-label="关闭"><i data-lucide="x"></i></button>
        </div>
        <div class="v28m-body v28-src-body">
          <label class="record-upload-zone" id="record-upload-zone">
            <span class="record-upload-icon"><i data-lucide="upload-cloud"></i></span>
            <span class="record-upload-main">
              <span class="record-upload-title">拖拽 PDF / Word 到这里，或选择本地文件</span>
              <span class="record-upload-sub">支持 .pdf / .doc / .docx；上传后生成独立录题任务，需要老师校对后入题库。知识库资料请在知识库上传或文件列表中勾选沉淀。</span>
            </span>
            <span class="record-upload-action">选择文件</span>
            <input id="record-upload-input" type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" multiple hidden />
          </label>
          <div class="record-local-list" id="record-local-list"></div>
        </div>
        <div class="v28m-foot">
          <span class="v28m-foot-meta" id="record-fallback-meta">请上传或拖入要解析的文件</span>
          <button class="v28m-btn" data-close>取消</button>
          <button class="v28m-btn primary" id="record-fallback-submit" disabled data-track="/click/feixiangCampusAiRecordPage/submitLocalFile | 提交本地文件录题 | fileCount#INT32,fileType#STRING">
            <i data-lucide="sparkles"></i><span>开始 AI 录题 (0)</span>
          </button>
        </div>
      `;
      document.body.appendChild(overlay);
      document.body.appendChild(dialog);

      let canOverlayClose = false;
      const close = () => { overlay.remove(); dialog.remove(); };
      setTimeout(() => { canOverlayClose = true; }, 180);
      overlay.addEventListener('click', event => {
        if(!canOverlayClose || event.target !== overlay) return;
        close();
      });
      dialog.addEventListener('click', event => event.stopPropagation());
      dialog.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', event => {
        event.stopPropagation();
        close();
      }));

      const uploadZone = dialog.querySelector('#record-upload-zone');
      const uploadInput = dialog.querySelector('#record-upload-input');
      const localList = dialog.querySelector('#record-local-list');
      const submit = dialog.querySelector('#record-fallback-submit');
      const meta = dialog.querySelector('#record-fallback-meta');

      function formatBytes(size){
        if(!Number.isFinite(size)) return '';
        if(size >= 1024 * 1024) return (size / 1024 / 1024).toFixed(size >= 10 * 1024 * 1024 ? 0 : 1) + ' MB';
        if(size >= 1024) return Math.round(size / 1024) + ' KB';
        return size + ' B';
      }
      function normalizeLocalFiles(fileList){
        const files = Array.from(fileList || []);
        let skipped = 0;
        files.forEach(file => {
          const ext = (file.name.split('.').pop() || '').toLowerCase();
          if(!['pdf','doc','docx'].includes(ext)){
            skipped += 1;
            return;
          }
          const dup = localUploads.some(item => item.name === file.name && item.rawSize === file.size);
          if(dup) return;
          const item = {
            id: 'local-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7),
            name: file.name,
            type: ext === 'pdf' ? 'pdf' : 'docx',
            size: formatBytes(file.size),
            rawSize: file.size,
            kbLabel: '本地上传',
            group: '本地上传',
            isLocal: true
          };
          localUploads.push(item);
          selected.add(item.id);
        });
        if(skipped) showToast(`已忽略 ${skipped} 个非 PDF / Word 文件`);
        renderLocalUploads();
        syncFooter();
      }
      function renderLocalUploads(){
        if(!localUploads.length){
          localList.innerHTML = '';
          return;
        }
        localList.innerHTML = localUploads.map(file => `
          <div class="record-local-item" data-local-id="${file.id}">
            <i data-lucide="${file.type === 'pdf' ? 'file-text' : 'file'}"></i>
            <span class="record-local-name" title="${escHtml(file.name)}">${escHtml(file.name)}</span>
            <span class="record-local-size">${escHtml(file.size)}</span>
            <button class="record-local-remove" type="button" data-remove-local="${file.id}" title="移除">
              <i data-lucide="x"></i>
            </button>
          </div>
        `).join('');
        if(window.lucide) lucide.createIcons();
      }
      function syncFooter(){
        const n = selected.size;
        meta.textContent = n ? `已选 ${n} 个文件 · 提交后每个文件生成 1 个独立任务` : '请上传或拖入要解析的文件';
        submit.disabled = n === 0;
        submit.querySelector('span').textContent = `开始 AI 录题 (${n})`;
      }
      localList.addEventListener('click', event => {
        const removeBtn = event.target.closest('[data-remove-local]');
        if(!removeBtn) return;
        const id = removeBtn.dataset.removeLocal;
        const idx = localUploads.findIndex(file => file.id === id);
        if(idx >= 0) localUploads.splice(idx, 1);
        selected.delete(id);
        renderLocalUploads();
        syncFooter();
      });
      uploadZone.addEventListener('dragover', event => {
        event.preventDefault();
        uploadZone.classList.add('is-dragover');
      });
      uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('is-dragover');
      });
      uploadZone.addEventListener('drop', event => {
        event.preventDefault();
        uploadZone.classList.remove('is-dragover');
        normalizeLocalFiles(event.dataTransfer && event.dataTransfer.files);
      });
      uploadInput.addEventListener('change', () => {
        normalizeLocalFiles(uploadInput.files);
        uploadInput.value = '';
      });
      submit.addEventListener('click', () => {
        const files = localUploads.filter(file => selected.has(file.id));
        if(!files.length) return;
        const jobs = createLocalJobs(files);
        close();
        if(typeof opts.onSubmit === 'function') opts.onSubmit(jobs);
        renderList();
      });

      renderLocalUploads();
      syncFooter();
      if(window.lucide) lucide.createIcons();
    }

    /* —— 主入口：打开 V28RecordDialog —— */
    function openRecordDialog(opts){
      const payload = {
        preselectFileIds: opts && opts.preselectFileIds,
        onSubmit: (jobs) => {
          if(jobs && jobs.length){
            showToast(`已开始解析 ${jobs.length} 个文件 · 解析完成会自动通知`);
          }
          /* 留在 09，不跳转，主动滚动到列表顶部新任务 */
          requestAnimationFrame(() => {
            const first = root.querySelector('.recp-item');
            if(first) first.scrollIntoView({ behavior:'smooth', block:'center' });
          });
        }
      };
      /* 校园版使用内置新建流程: + AI 录题 → 选择文件 → 开始解析 → 任务进度 */
      openRecordFallback(payload);
    }

    /* —— 事件绑定 —— */
    if(recordBtn){
      recordBtn.addEventListener('click', event => {
        event.preventDefault();
        event.stopPropagation();
        openRecordDialog();
      });
    }
    if(stateSel){
      stateSel.addEventListener('change', e => { filterState = e.target.value; renderList(); });
    }
    if(searchInp){
      searchInp.addEventListener('input', e => { keyword = e.target.value; renderList(); });
    }

    /* —— 初始化 + 订阅状态变化 + 周期刷新（更新进度条/相对时间） —— */
    function init(){
      ensureLocalParsingTimers();
      renderList();
      if(window.V28RecordJobs && V28RecordJobs.subscribe){
        V28RecordJobs.subscribe(() => {
          renderList();
        });
      }
    }
    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
    /* 1s 节奏更新解析中进度条 + 相对时间 · 不依赖 subscribe */
    setInterval(() => {
      const hasParsing = window.V28RecordJobs && V28RecordJobs.parsingCount() > 0;
      if(hasParsing) renderList();
    }, 1000);
  })();
</script>
