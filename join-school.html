<div class="join-page">

<div class="toast" id="toast"></div>
<script>
  let toastTimer = null;
  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.style.opacity = '0', 2200);
  }

  function setSteps(step) {
    document.querySelectorAll('.step').forEach((item) => {
      const value = Number(item.dataset.step);
      item.classList.toggle('active', value === step);
      item.classList.toggle('done', value < step);
    });
  }

  function goStep(step) {
    if (document.body.dataset.linkState === 'expired') {
      showToast('邀请链接已过期');
      return;
    }
    document.querySelectorAll('.flow-panel').forEach((panel) => panel.classList.remove('active'));
    setSteps(step);
    if (step === 1) {
      document.getElementById('phonePanel').classList.add('active');
    }
    if (step === 2) {
      const rawPhone = document.getElementById('phoneInput').value.replace(/\s/g, '');
      document.getElementById('confirmPhone').textContent = formatPhone(rawPhone);
      document.getElementById('profilePanel').classList.add('active');
    }
    if (step === 3) {
      document.getElementById('successPanel').classList.add('active');
    }
    if (window.lucide) lucide.createIcons();
  }

  function formatPhone(phone) {
    const normalized = phone || '13800138012';
    return normalized.replace(/(\d{3})(\d{4})(\d{4})/, '$1 $2 $3');
  }

  function sendCode() {
    showToast('验证码已发送');
  }

  function enterSchool() {
    window.location.href = 'index.html';
  }

  function setLinkState(state) {
    document.body.dataset.linkState = state;
    const status = document.getElementById('linkStatus');
    const warning = document.getElementById('linkWarning');
    const cardBody = document.querySelector('.join-card-body');
    warning.classList.toggle('visible', state === 'expired');
    cardBody.style.opacity = state === 'expired' ? '.48' : '1';
    cardBody.style.pointerEvents = state === 'expired' ? 'none' : 'auto';
    if (state === 'valid') {
      status.innerHTML = '<i data-lucide="shield-check"></i><span>邀请链接有效</span>';
      goStep(1);
    }
    if (state === 'expired') {
      status.innerHTML = '<i data-lucide="circle-alert"></i><span>邀请链接已过期</span>';
    }
    if (state === 'joined') {
      status.innerHTML = '<i data-lucide="badge-check"></i><span>你已加入本校</span>';
      goStep(3);
    }
    if (window.lucide) lucide.createIcons();
  }

  function applyInviteFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const state = params.get('state') || 'valid';
    const invite = params.get('invite');
    if (invite) {
      const expireText = document.getElementById('expireText');
      expireText.textContent = state === 'expired'
        ? '张老师邀请你加入 · 链接已失效：' + invite
        : '张老师邀请你加入 · 有效期至 2026-06-08 10:18';
    }
    setLinkState(state);
  }

  document.body.dataset.linkState = 'valid';
  applyInviteFromUrl();
  if (window.lucide) lucide.createIcons();
</script>
